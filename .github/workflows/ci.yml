name: "CI/CD Pipeline"

on:
  pull_request:
    branches:
      - develop
      - master
      - main

jobs:
  backend-lint-and-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: e_plant_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Flake8 (Linting)
        working-directory: ./backend
        run: flake8 . --max-line-length=120
        
      - name: Run Black (Formatting Check)
        working-directory: ./backend
        run: black . --check
        
      - name: Run Pytest
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          SECRET_KEY: ${{ secrets.TEST_SECRET_KEY != '' && secrets.TEST_SECRET_KEY || 'ci-cd-testing-secret-key-123' }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: e_plant_db
        run: pytest

  frontend-lint-and-build:
    name: Frontend Lint & Vite Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install
        
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
        
      - name: Build React App via Vite
        working-directory: ./frontend
        run: npm run build

  integration-docker-build:
    name: Docker Environment Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint-and-test, frontend-lint-and-build]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy ENVs for Docker Composition
        run: cp .env.example .env

      - name: Test Docker Compose Dev Build
        run: docker compose -f docker-compose.yml build

      - name: Test Docker Compose Prod Build
        run: docker compose -f docker-compose.prod.yml build
