<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAS – Detail produktu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; -webkit-font-smoothing: antialiased; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .related-card { transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
    .related-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: rgba(6,182,212,0.4) !important; }
    button, select { cursor: pointer; font-family: inherit; }
    select { -webkit-appearance: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const COMPATIBLE_SCREWS = [
  {id:101, name:'Prosthetic Screw M2 L10', ref:'40.001', stock:50},
  {id:102, name:'Prosthetic Screw M2 L14', ref:'40.002', stock:32},
  {id:103, name:'Carrier Screw M1.6 L12',  ref:'41.001', stock:0},
];

const VARIANT_OPTIONS = [
  {ref:'31.001-35', label:'Ø3.5 NP', tokens:'PLATFORM(mm): 3.5|HEIGHT(mm): 3.5|ENGAGING: YES', stock:12, price:'106.80', net:'89.00'},
  {ref:'31.001-40', label:'Ø4.0 RP', tokens:'PLATFORM(mm): 4.0|HEIGHT(mm): 4.5|ENGAGING: YES', stock:4,  price:'106.80', net:'89.00'},
  {ref:'31.001-45', label:'Ø4.5 WP', tokens:'PLATFORM(mm): 4.5|HEIGHT(mm): 5.0|ENGAGING: NO',  stock:0,  price:'110.40', net:'92.00'},
  {ref:'31.001-50', label:'Ø5.0 WP', tokens:'PLATFORM(mm): 5.0|HEIGHT(mm): 5.5|ENGAGING: NO',  stock:8,  price:'110.40', net:'92.00'},
  {ref:'31.001-55', label:'Ø5.5 EWP',tokens:'PLATFORM(mm): 5.5|HEIGHT(mm): 6.0|ENGAGING: NO',  stock:3,  price:'114.00', net:'95.00'},
];

const PRODUCT = {
  id: 15,
  name: 'TiBase Multi-System Pack',
  maskedRef: '31.XXX',
  type: 'tibase',
  cat: 'TITANIUM BASE (screw included)',
  allCats: ['TITANIUM BASE (screw included)', 'CAD/CAM SOLUTIONS', 'DIGITAL WORKFLOW'],
  compat: ['0041', '0052', '0063'],
  description: 'Kompletný systém TiBase s viacerými variantmi platformy. Ideálny pre digitálny workflow v modernej implantológii. Každá TiBase je dodávaná s kompatibilnou prostetickou skrutkou.',
  isGroup: true,
  variantCount: 8,
};

const RELATED = [
  {id:1, name:'TiBase NP Ø3.5 Screw Included', ref:'31.001-35', cat:'TITANIUM BASE (screw included)', gross:'106.80', stock:12},
  {id:8, name:'Scanbody TiBase NP',             ref:'30.001-NP', cat:'SCANBODY TIBASE',               gross:'62.40',  stock:20},
  {id:6, name:'Prosthetic Screw M2 L10',        ref:'40.001',    cat:'SCREWS',                        gross:'10.20',  stock:50},
  {id:4, name:'Multi-Unit Abutment 0°',         ref:'42.001-0S', cat:'MULTI-UNIT',                    gross:'160.80', stock:5},
];

// ── NAVBAR ────────────────────────────────────────────────────────────────────
function Navbar({cartCount, onBack}) {
  return (
    <nav style={{position:'sticky',top:0,zIndex:100,height:64,background:'#020617',borderBottom:'1px solid rgba(6,182,212,0.18)',display:'flex',alignItems:'center',paddingInline:24,gap:32}}>
      <span style={{fontWeight:800,fontSize:18,letterSpacing:'-0.05em',background:'linear-gradient(135deg,#06b6d4,#10b981)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',flexShrink:0}}>DAS</span>
      <div style={{flex:1,display:'flex',gap:24}}>
        {[['Produkty',false],['O nás',false],['Kontakt',false]].map(([l,a])=>(
          <a key={l} href="#" style={{fontSize:14,color:a?'#fff':'rgba(255,255,255,0.45)',fontWeight:a?600:400,textDecoration:'none'}}>{l}</a>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button style={{position:'relative',background:'rgba(6,182,212,0.1)',border:'1px solid rgba(6,182,212,0.25)',borderRadius:10,padding:'8px 14px',display:'flex',alignItems:'center',gap:8,color:'#fff'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span style={{fontSize:13,fontWeight:600}}>{cartCount}</span>
          {cartCount>0&&<span style={{position:'absolute',top:-5,right:-5,width:18,height:18,borderRadius:'50%',background:'linear-gradient(135deg,#06b6d4,#10b981)',fontSize:10,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{cartCount}</span>}
        </button>
        <button style={{background:'none',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,padding:'7px 14px',color:'rgba(255,255,255,0.7)',fontSize:13}}>Prihlásiť sa</button>
      </div>
    </nav>
  );
}

// ── BREADCRUMB BAR ────────────────────────────────────────────────────────────
function BreadcrumbBar({onBack, reference}) {
  return (
    <div style={{borderBottom:'1px solid #e2e8f0',background:'#fff',padding:'14px 24px'}}>
      <div style={{maxWidth:1152,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <button onClick={onBack} style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:14,fontWeight:600,color:'#0891b2',background:'none',border:'none',padding:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Produkty
        </button>
        {reference&&(
          <button style={{display:'inline-flex',alignItems:'center',gap:8,padding:'7px 14px',borderRadius:8,border:'1px solid #a5f3fc',background:'#e0f7fa',fontSize:12,fontWeight:600,color:'#0891b2'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            Pozrieť v katalógu
          </button>
        )}
      </div>
    </div>
  );
}

// ── RELATED CARD ──────────────────────────────────────────────────────────────
function RelatedCard({product}) {
  return (
    <div className="related-card" style={{display:'flex',gap:12,padding:12,borderRadius:12,border:'1px solid #e2e8f0',background:'#fff',cursor:'pointer',minHeight:144}}>
      <div style={{width:112,height:112,flexShrink:0,borderRadius:8,background:'linear-gradient(135deg,#f0fdfe,#ecfdf5)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="#cbd5e1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
      </div>
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
        <p style={{fontSize:13,fontWeight:600,color:'#0f172a',lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',marginBottom:4}}>{product.name}</p>
        {product.ref&&<p style={{fontSize:11,color:'#64748b',fontWeight:500,marginBottom:'auto'}}>{product.ref}</p>}
        <div style={{marginTop:'auto'}}>
          <p style={{fontSize:13,fontWeight:700,color:'#0891b2'}}>{product.gross} € s DPH</p>
        </div>
      </div>
    </div>
  );
}

// ── MAIN PAGE ─────────────────────────────────────────────────────────────────
function ProductDetailPage() {
  const [selVariantRef, setSelVariantRef] = useState(VARIANT_OPTIONS[0].ref);
  const [selScrewId, setSelScrewId] = useState(COMPATIBLE_SCREWS[0].id);
  const [zoomOrigin, setZoomOrigin] = useState('50% 50%');
  const [isZoomed, setIsZoomed] = useState(false);
  const [cart, setCart] = useState({});
  const [page, setPage] = useState('detail'); // 'detail' | 'products'

  const addToCart = (id, variantRef, delta=1) => setCart(prev=>{
    const k=`${id}::${variantRef||''}`;
    const cur=prev[k]||0, next=Math.max(0,cur+delta);
    if(next===0){const{[k]:_,...rest}=prev;return rest;}
    return{...prev,[k]:next};
  });
  const cartCount = Object.values(cart).reduce((s,q)=>s+q,0);

  const activeVariant = VARIANT_OPTIONS.find(v=>v.ref===selVariantRef) || VARIANT_OPTIONS[0];
  const cartKey = `${PRODUCT.id}::${activeVariant.ref}`;
  const cartItem = cart[cartKey] || 0;
  const effectivePrice = activeVariant.price;
  const effectiveNet = activeVariant.net;
  const effectiveStock = activeVariant.stock;
  const selectedScrew = COMPATIBLE_SCREWS.find(s=>s.id===selScrewId) || COMPATIBLE_SCREWS[0];

  const tokenPairs = activeVariant.tokens.split('|').map(t=>{
    const ci=t.indexOf(':');
    return ci===-1?null:{key:t.slice(0,ci).trim(),val:t.slice(ci+1).trim()};
  }).filter(Boolean);

  if(page==='products') {
    return (
      <div style={{minHeight:'100vh',background:'#f8fafc',fontFamily:'Inter, sans-serif',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:18,fontWeight:700,color:'#0f172a',marginBottom:16}}>← Produkty</p>
          <button onClick={()=>setPage('detail')} style={{color:'#0891b2',background:'none',border:'none',fontSize:14}}>Späť na detail</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{fontFamily:'Inter, sans-serif',background:'#f8fafc',minHeight:'100vh'}}>
      <Navbar cartCount={cartCount} onBack={()=>setPage('products')} />
      <BreadcrumbBar onBack={()=>setPage('products')} reference={PRODUCT.maskedRef} />

      {/* Main content */}
      <section style={{padding:'32px 24px 40px'}}>
        <div style={{maxWidth:1152,margin:'0 auto',display:'grid',gridTemplateColumns:'minmax(0,1.2fr) minmax(380px,0.8fr)',gap:32}}>
          {/* LEFT: Image */}
          <div style={{borderRadius:16,overflow:'hidden',border:'1px solid #e2e8f0',background:'#fff'}}>
            <div
              style={{aspectRatio:'4/3',minHeight:320,overflow:'hidden',background:'#f1f5f9',position:'relative',cursor:'zoom-in'}}
              onMouseMove={e=>{
                const r=e.currentTarget.getBoundingClientRect();
                setZoomOrigin(`${((e.clientX-r.left)/r.width*100)}% ${((e.clientY-r.top)/r.height*100)}%`);
                setIsZoomed(true);
              }}
              onMouseLeave={()=>{ setZoomOrigin('50% 50%'); setIsZoomed(false); }}
            >
              <div style={{width:'100%',height:'100%',background:'linear-gradient(135deg,#f0fdfe,#ecfdf5)',display:'flex',alignItems:'center',justifyContent:'center',transition:'transform 0.2s ease-out',transform:isZoomed?'scale(1.75)':'scale(1)',transformOrigin:zoomOrigin}}>
                <svg width="96" height="96" viewBox="0 0 24 24" fill="#a0aec0"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
              </div>
              {isZoomed&&(
                <div style={{position:'absolute',top:12,right:12,background:'rgba(255,255,255,0.92)',borderRadius:8,padding:'5px 10px',fontSize:12,fontWeight:600,color:'#475569',display:'flex',alignItems:'center',gap:6,boxShadow:'0 2px 8px rgba(0,0,0,0.1)',pointerEvents:'none'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                  Zoom
                </div>
              )}
            </div>
          </div>

          {/* RIGHT: Info */}
          <div style={{minWidth:0}}>
            {/* Category tags */}
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
              {PRODUCT.allCats.slice(0,4).map(cat=>(
                <span key={cat} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:8,background:'#e0f7fa',fontSize:12,fontWeight:600,color:'#0891b2'}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                  {cat}
                </span>
              ))}
            </div>

            <h1 style={{fontSize:32,fontWeight:800,color:'#020617',lineHeight:1.1,letterSpacing:'-0.03em',marginBottom:8}}>{PRODUCT.name}</h1>
            <p style={{fontSize:14,fontWeight:600,color:'#64748b',marginBottom:16}}>{PRODUCT.maskedRef}</p>

            {/* Compat codes */}
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:24}}>
              {PRODUCT.compat.map(code=>(
                <span key={code} style={{padding:'4px 10px',borderRadius:8,border:'1px solid #ddd6fe',background:'#f5f3ff',fontSize:12,fontWeight:700,color:'#7c3aed'}}>{code}</span>
              ))}
            </div>

            {/* Variant selector */}
            <div style={{marginBottom:24}}>
              <p style={{fontSize:11,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Variant</p>
              <div style={{position:'relative'}}>
                <select value={selVariantRef} onChange={e=>setSelVariantRef(e.target.value)} style={{width:'100%',padding:'12px 40px 12px 14px',borderRadius:12,border:'1px solid #e2e8f0',fontSize:14,color:'#0f172a',background:'#fff',fontFamily:'inherit',outline:'none',appearance:'none',fontWeight:500}}>
                  {VARIANT_OPTIONS.map(v=>(
                    <option key={v.ref} value={v.ref}>{v.label} — {v.ref} {v.stock===0?'(Vypredané)':v.stock<=5?`(Posl. ${v.stock} ks)`:''}</option>
                  ))}
                </select>
                <svg style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 9l-7 7-7-7"/></svg>
              </div>
            </div>

            {/* TiBase screw selector */}
            <div style={{marginBottom:24,borderRadius:12,border:'1px solid #d1fae5',background:'rgba(240,253,244,0.6)',padding:'14px 16px'}}>
              <p style={{fontSize:11,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12}}>
                Skrutka <span style={{color:'#059669',fontWeight:700}}>({cartItem||1} ks zadarmo)</span>
              </p>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {COMPATIBLE_SCREWS.map(screw=>(
                  <label key={screw.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:10,border:'1px solid',cursor:screw.stock>0?'pointer':'not-allowed',opacity:screw.stock===0?0.5:1,borderColor:selScrewId===screw.id?'#06b6d4':'#d1fae5',background:selScrewId===screw.id?'#fff':'rgba(255,255,255,0.6)',transition:'all 0.15s'}}>
                    <input type="radio" name="screw" value={screw.id} checked={selScrewId===screw.id} onChange={()=>screw.stock>0&&setSelScrewId(screw.id)} disabled={screw.stock===0} style={{accentColor:'#0891b2',width:16,height:16}} />
                    <span style={{flex:1,minWidth:0}}>
                      <span style={{display:'block',fontSize:13,fontWeight:600,color:selScrewId===screw.id?'#0c4a6e':'#334155'}}>{screw.name}</span>
                      <span style={{display:'block',fontSize:11,color:'#64748b',marginTop:1}}>{screw.ref}</span>
                    </span>
                    <span style={{fontSize:12,fontWeight:600,flexShrink:0,color:screw.stock>0?'#059669':'#dc2626'}}>{screw.stock>0?`${screw.stock} ks`:'Nie je skladom'}</span>
                  </label>
                ))}
              </div>
            </div>

            {/* Price & CTA */}
            <div style={{paddingTop:20,borderTop:'1px solid #e2e8f0'}}>
              <p style={{fontSize:13,color:'#94a3b8',marginBottom:4}}>bez DPH {effectiveNet} €</p>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <p style={{fontSize:34,fontWeight:800,color:'#0891b2',letterSpacing:'-0.03em'}}>{effectivePrice} €<span style={{fontSize:16,fontWeight:400,color:'#64748b',marginLeft:6}}>s DPH</span></p>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {cartItem>0?(
                  <>
                    <div style={{display:'flex',alignItems:'center',height:52,borderRadius:12,border:'1px solid #a5f3fc',background:'#e0f7fa',overflow:'hidden'}}>
                      <button onClick={()=>addToCart(PRODUCT.id,activeVariant.ref,-1)} style={{width:52,height:'100%',background:'none',border:'none',color:'#0891b2',fontSize:22,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>
                      <span style={{flex:1,textAlign:'center',fontWeight:700,color:'#0c4a6e',borderLeft:'1px solid #a5f3fc',borderRight:'1px solid #a5f3fc',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',fontSize:16,gap:6}}>
                        {cartItem}<span style={{fontSize:12,fontWeight:400,color:'#0891b2'}}>v košíku</span>
                      </span>
                      <button onClick={()=>addToCart(PRODUCT.id,activeVariant.ref,1)} disabled={cartItem>=effectiveStock} style={{width:52,height:'100%',background:'none',border:'none',color:cartItem>=effectiveStock?'#94a3b8':'#0891b2',fontSize:22,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                    </div>
                    <button style={{height:48,borderRadius:12,background:'#0891b2',border:'none',color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                      Do košíka
                    </button>
                  </>
                ):effectiveStock<=0?(
                  <button style={{height:52,borderRadius:12,background:'#64748b',border:'none',color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    Požiadať produkt
                  </button>
                ):(
                  <div style={{display:'flex',gap:10}}>
                    <button onClick={()=>addToCart(PRODUCT.id,activeVariant.ref,1)} style={{flex:1,height:52,borderRadius:12,background:'linear-gradient(135deg,#06b6d4,#0891b2)',border:'none',color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:'0 4px 16px rgba(6,182,212,0.25)'}}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                      Pridať do košíka
                    </button>
                    <button style={{height:52,padding:'0 20px',borderRadius:12,background:'#fff',border:'1px solid #e2e8f0',fontSize:14,fontWeight:600,color:'#475569',display:'flex',alignItems:'center',gap:8}}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                      Košík
                    </button>
                  </div>
                )}
                {/* Stock info */}
                <p style={{fontSize:12,color:effectiveStock>5?'#059669':effectiveStock>0?'#92400e':'#dc2626',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{width:7,height:7,borderRadius:'50%',background:effectiveStock>5?'#10b981':effectiveStock>0?'#f59e0b':'#ef4444',flexShrink:0}} />
                  {effectiveStock>5?`Na sklade – ${effectiveStock} ks`:effectiveStock>0?`Posledné ${effectiveStock} ks`:'Momentálne vypredané'}
                </p>
              </div>
            </div>
          </div>
        </div>

        {/* DETAILS TABLE */}
        <div style={{maxWidth:1152,margin:'32px auto 0',borderRadius:16,border:'1px solid #e2e8f0',background:'#fff',padding:'24px 28px'}}>
          <h2 style={{fontSize:18,fontWeight:700,color:'#020617',marginBottom:20}}>Detaily a vlastnosti</h2>
          <dl style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px 32px'}}>
            <div style={{display:'grid',gridTemplateColumns:'160px 1fr',gap:'0 12px'}}>
              <dt style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',paddingTop:2}}>Systémy</dt>
              <dd style={{fontSize:14,color:'#334155'}}>{PRODUCT.allCats.join(', ')}</dd>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'160px 1fr',gap:'0 12px'}}>
              <dt style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',paddingTop:2}}>Kódy</dt>
              <dd style={{fontSize:14,color:'#334155'}}>{PRODUCT.compat.join(', ')}</dd>
            </div>
            {tokenPairs.map(({key,val})=>(
              <div key={key} style={{display:'grid',gridTemplateColumns:'160px 1fr',gap:'0 12px'}}>
                <dt style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',paddingTop:2}}>{key}</dt>
                <dd style={{fontSize:14,color:'#334155',fontFamily:'monospace'}}>{val}</dd>
              </div>
            ))}
            <div style={{display:'grid',gridTemplateColumns:'160px 1fr',gap:'0 12px'}}>
              <dt style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',paddingTop:2}}>Referencia</dt>
              <dd style={{fontSize:14,color:'#334155',fontFamily:'monospace'}}>{activeVariant.ref}</dd>
            </div>
            <div style={{gridColumn:'1/-1',display:'grid',gridTemplateColumns:'160px 1fr',gap:'0 12px'}}>
              <dt style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',paddingTop:2}}>Popis</dt>
              <dd style={{fontSize:14,color:'#334155',lineHeight:1.6}}>{PRODUCT.description}</dd>
            </div>
          </dl>
        </div>
      </section>

      {/* RELATED PRODUCTS */}
      <section style={{borderTop:'1px solid #e2e8f0',background:'#fff',padding:'32px 24px 48px'}}>
        <div style={{maxWidth:1152,margin:'0 auto'}}>
          <h2 style={{fontSize:20,fontWeight:700,color:'#020617',marginBottom:20}}>Súvisiace produkty</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
            {RELATED.map(p=><RelatedCard key={p.id} product={p} />)}
          </div>
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProductDetailPage />);
</script>
</body>
</html>
