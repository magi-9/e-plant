<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebringer — Domov (mobil)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Mulish',sans-serif;background:#d7dee0;-webkit-font-smoothing:antialiased;
       min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px}
  /* On small screens, drop the bezel and go edge-to-edge */
  @media(max-width:520px){
    body{padding:0;background:#eef3f3;align-items:stretch}
    #device-wrap{transform:none !important}
    .ios-bezel-hide .ios-frame-shell{box-shadow:none !important;border-radius:0 !important;width:100% !important;height:auto !important}
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="hero-light-mobile.jsx"></script>
<script type="text/babel" data-presets="react">
  const Device = window.IOSDevice;
  const Page = window.HeroLightMobile;
  function App(){
    const small = window.matchMedia('(max-width:520px)').matches;
    if (small) {
      // edge-to-edge mobile, no bezel
      return <Page/>;
    }
    return (
      <div id="device-wrap">
        <Device width={402} height={860}>
          <Page/>
        </Device>
      </div>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  function render(){ root.render(<App/>); }
  render();
  // fit the phone to viewport height on desktop
  function fit(){
    const small = window.matchMedia('(max-width:520px)').matches;
    const wrap = document.getElementById('device-wrap');
    if (!wrap || small){ if(wrap) wrap.style.transform='none'; return; }
    const avail = window.innerHeight - 56;
    const s = Math.min(1, avail / 860);
    wrap.style.transformOrigin = 'top center';
    wrap.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', ()=>{ render(); requestAnimationFrame(fit); });
  requestAnimationFrame(fit);
</script>
</body>
</html>
