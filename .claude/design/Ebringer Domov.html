<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental design studio Ebringer — zubná technika a digitálna implantoprotetika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Mulish',sans-serif;background:#eef3f3;-webkit-font-smoothing:antialiased}
  #stage{width:100%;display:flex;justify-content:center;background:#eef3f3}
  #holder{position:relative}
  #frame{width:1440px;height:2320px;transform-origin:top left}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="stage"><div id="holder"><div id="frame"><div id="root-hero"></div></div></div></div>
<script type="text/babel" src="hero-light.jsx"></script>
<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById('root-hero')).render(<window.HeroLight/>);
  const frame = document.getElementById('frame');
  const holder = document.getElementById('holder');
  function fit(){
    const s = Math.min(1, window.innerWidth / 1440);
    frame.style.transform = 'scale(' + s + ')';
    holder.style.width = (1440 * s) + 'px';
    holder.style.height = (2320 * s) + 'px';
  }
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
