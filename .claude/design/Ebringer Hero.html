<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebringer — Hlavná stránka (2 varianty)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Marcellus&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: 'Mulish', sans-serif; background: #e7ebec; -webkit-font-smoothing: antialiased; }
  a { -webkit-tap-highlight-color: transparent; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hero-light.jsx"></script>
<script type="text/babel" src="hero-dark.jsx"></script>
<script type="text/babel" data-presets="react">
  const Canvas = window.DesignCanvas;
  const Section = window.DCSection;
  const Artboard = window.DCArtboard;
  const VarLight = window.HeroLight;
  const VarDark = window.HeroDark;
  function App() {
    return (
      <Canvas>
        <Section id="hero" title="Hlavná stránka — Ebringer" subtitle="Predstavenie Martina Ebringera a jeho práce · dve vizuálne varianty · prepojené na e-shop">
          <Artboard id="light" label="A · Svetlá / editoriálna" width={1440} height={2320}>
            <VarLight />
          </Artboard>
          <Artboard id="dark" label="B · Tmavá / profesionálna" width={1440} height={2320}>
            <VarDark />
          </Artboard>
        </Section>
      </Canvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
