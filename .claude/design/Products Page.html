  const l2=n%100, l1=n%10;
  if(l2>=11&&l2<=14) return 'variantov';
  if(l1===1) return 'variant';
  if(l1>=2&&l1<=4) return 'varianty';

// ── NAVBAR ────────────────────────────────────────────────────────────────────

// ── SIDEBAR ───────────────────────────────────────────────────────────────────

    borderColor:active?(c==='violet'?'rgba(139,92,246,0.25)':'rgba(8,145,178,0.2)'):'transparent',

    <aside style={{width:240,background:'#fff',borderRight:'1px solid #e2e8f0',position:'fixed',left:0,top:64,bottom:0,overflowY:'auto',zIndex:20}}>
      <div style={{padding:'16px 12px'}}>
        {/* Product types */}
        <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Typ produktu</p>
        <div style={{display:'flex',flexDirection:'column',gap:2,marginBottom:20}}>
          <button onClick={()=>setSelType('')} style={sbtn(!selType)}>
            <span>Všetky typy</span><span style={badge(!selType)}>{TOTAL_TYPE_COUNT}</span>
          </button>
          {PRODUCT_TYPES.map(opt=>{
            const a=selType===opt.value;
            return <button key={opt.value} onClick={()=>setSelType(a?'':opt.value)} style={sbtn(a)}>
              <span>{opt.label}</span><span style={badge(a)}>{opt.count}</span>
            </button>;
          })}
        </div>
        {divider}
        {/* Categories */}

          <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em'}}>Kategórie</p>
          <svg style={{width:14,height:14,color:'#94a3b8',transform:catOpen?'rotate(180deg)':'none',transition:'transform 0.2s'}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        {catOpen&&(
          <div style={{display:'flex',flexDirection:'column',gap:2,marginBottom:20}}>
            <button onClick={()=>setSelCats([])} style={sbtn(selCats.length===0)}>
              <span>Všetko</span><span style={badge(selCats.length===0)}>{PRODUCTS.length}</span>
            </button>
            {CATEGORIES.map(cat=>{
              const a=selCats.includes(cat);
              return <button key={cat} onClick={()=>setSelCats(a?selCats.filter(c=>c!==cat):[...selCats,cat])} style={sbtn(a)}>
                <span style={{fontSize:13}}>{cat}</span><span style={badge(a)}>{CAT_COUNTS[cat]||0}</span>
              </button>;
            })}
          </div>
        )}
        {divider}
        {/* Compat */}
        <button onClick={()=>setCompatOpen(o=>!o)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,background:'none',border:'none',padding:0}}>
          <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em'}}>Kompatibilita</p>
          <svg style={{width:14,height:14,color:'#94a3b8',transform:(compatOpen||!!selCompat)?'rotate(180deg)':'none',transition:'transform 0.2s'}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        {(compatOpen||selCompat)&&(
          <div style={{display:'flex',flexDirection:'column',gap:2,marginBottom:20}}>
            {COMPAT_CODES.map(opt=>{
              const a=selCompat===opt.code;
              return <button key={opt.code} onClick={()=>setSelCompat(a?null:opt.code)} style={sbtn(a,'violet')}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{width:8,height:8,borderRadius:2,background:a?'#7c3aed':'#a78bfa',flexShrink:0}} />
                  <span style={{fontSize:13}}>{opt.code}</span>
                </div>
                <span style={badge(a,'violet')}>{opt.count}</span>
              </button>;
            })}
          </div>
        )}
        {/* Price */}
        <div style={{borderTop:'1px solid #f1f5f9',paddingTop:16}}>
          <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:12}}>Max. cena</p>
          <input type="range" min="0" max="500" step="10" value={maxPrice} onChange={e=>setMaxPrice(Number(e.target.value))} />
          <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
            <span style={{fontSize:12,color:'#94a3b8'}}>0 €</span>
            <span style={{fontSize:12,fontWeight:600,color:maxPrice<500?'#0891b2':'#94a3b8'}}>{maxPrice>=500?'Všetky ceny':`do ${maxPrice} €`}</span>
          </div>
        </div>
        {/* In-stock */}
        <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid #f1f5f9'}}>
          <button onClick={()=>setInStock(!inStock)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:'none',border:'none',padding:0}}>
            <div style={{textAlign:'left'}}>
              <p style={{fontSize:14,fontWeight:500,color:'#0f172a'}}>Len skladom</p>
              <p style={{fontSize:12,color:'#94a3b8',marginTop:2}}>Skryť vypredané</p>
            </div>
            <div style={{width:40,height:22,borderRadius:11,background:inStock?'linear-gradient(135deg,#06b6d4,#10b981)':'#e2e8f0',position:'relative',flexShrink:0,transition:'background 0.2s'}}>

            </div>
          </button>
        </div>
      </div>
    </aside>
  );
}

  const dopt=(selected,c='cyan')=>({width:'100%',textAlign:'left',padding:'8px 12px',fontSize:14,background:selected?(c==='violet'?'#f5f3ff':'#e0f7fa'):'transparent',color:selected?(c==='violet'?'#7c3aed':'#0891b2'):'#475569',border:'none',fontWeight:selected?500:400,display:'flex',justifyContent:'space-between',alignItems:'center'});

  return (
    <div style={{display:'flex',alignItems:'center',gap:10,background:'#fff',border:'1px solid #e2e8f0',borderRadius:16,padding:'8px 16px',marginBottom:16}}>
      <div style={{flex:1,display:'flex',alignItems:'center',gap:8,minWidth:0}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Hľadať produkt, referenčné číslo..." style={{flex:1,border:'none',outline:'none',fontSize:14,color:'#0f172a',background:'transparent',fontFamily:'inherit'}} />
        {search&&<button onClick={()=>setSearch('')} style={{color:'#94a3b8',background:'none',border:'none',fontSize:18,lineHeight:1,padding:0}}>×</button>}
      </div>
      <div style={{width:1,height:24,background:'#e2e8f0',flexShrink:0}} />
      {/* Type */}
      <div style={{position:'relative'}}>
        <button style={dbtn(!!selType)} onClick={()=>{setTypeOpen(o=>!o);setCompatOpen(false);setSortOpen(false);}}>
          <span style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selTypeMeta?.label||'Typ produktu'}</span>{chevron(typeOpen)}
        </button>
        {typeOpen&&(
          <div style={{...dropBase,left:0,width:300}}>
            <button style={dopt(!selType)} onClick={()=>{setSelType('');setTypeOpen(false);}}><span style={{fontWeight:500}}>Všetky typy</span></button>
            {PRODUCT_TYPES.map(opt=>(
              <button key={opt.value} style={dopt(selType===opt.value)} onClick={()=>{setSelType(opt.value);setTypeOpen(false);}}>
                <span style={{fontWeight:500}}>{opt.label}</span>
                <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                  <span style={{fontSize:11,background:selType===opt.value?'#bae6fd':'#f1f5f9',color:selType===opt.value?'#0891b2':'#94a3b8',padding:'2px 8px',borderRadius:999,fontWeight:600}}>{opt.count}</span>
                  <span style={{fontSize:11,color:'#94a3b8'}}>{opt.prefixes}</span>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={{width:1,height:24,background:'#e2e8f0',flexShrink:0}} />
      {/* Compat */}
      <div style={{position:'relative'}}>
        <button style={dbtn(!!selCompat,'violet')} onClick={()=>{setCompatOpen(o=>!o);setTypeOpen(false);setSortOpen(false);}}>
          <span style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selCompat||'Kompatibilita'}</span>{chevron(compatOpen)}
        </button>
        {compatOpen&&(
          <div style={{...dropBase,left:0,width:260,maxHeight:272}}>
            <button style={dopt(!selCompat,'violet')} onClick={()=>{setSelCompat(null);setCompatOpen(false);}}><span style={{fontWeight:500}}>Všetky</span></button>
            {COMPAT_CODES.map(opt=>(
              <button key={opt.code} style={dopt(selCompat===opt.code,'violet')} onClick={()=>{setSelCompat(opt.code);setCompatOpen(false);}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{width:8,height:8,borderRadius:2,background:selCompat===opt.code?'#7c3aed':'#c4b5fd'}} /><span style={{fontWeight:500}}>{opt.code}</span></div>
                <span style={{fontSize:11,background:selCompat===opt.code?'#ede9fe':'#f1f5f9',color:selCompat===opt.code?'#7c3aed':'#94a3b8',padding:'2px 8px',borderRadius:999,fontWeight:600}}>{opt.count}</span>
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={{width:1,height:24,background:'#e2e8f0',flexShrink:0}} />
      {/* Sort */}
      <div style={{position:'relative'}}>
        <button style={dbtn(sortOrder!=='none')} onClick={()=>{setSortOpen(o=>!o);setTypeOpen(false);setCompatOpen(false);}}>
          <span>{sortLabels[sortOrder]}</span>{chevron(sortOpen)}
        </button>
        {sortOpen&&(
          <div style={{...dropBase,right:0,width:200}}>
            {[['none','Predvolené'],['asc','Cena: vzostupne'],['desc','Cena: zostupne']].map(([v,l])=>(
              <button key={v} style={dopt(sortOrder===v)} onClick={()=>{setSortOrder(v);setSortOpen(false);}}>{l}</button>
            ))}
          </div>
        )}
      </div>
      <div style={{width:1,height:24,background:'#e2e8f0',flexShrink:0}} />
      {/* View toggle */}
      {['grid','list'].map(mode=>(
        <button key={mode} onClick={()=>setViewMode(mode)} style={{width:32,height:32,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',background:viewMode===mode?'#e0f7fa':'transparent',color:viewMode===mode?'#0891b2':'#94a3b8',border:'none',transition:'all 0.15s'}}>
          {mode==='grid'?<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/></svg>}
        </button>
      ))}
    </div>
  );
}

// ── FILTER CHIPS ──────────────────────────────────────────────────────────────
function FilterChips({selType,setSelType,selCats,setSelCats,selCompat,setSelCompat,inStock,setInStock,maxPrice,setMaxPrice}) {
  const has=selType||selCats.length>0||selCompat||inStock||maxPrice<500;
  if(!has) return null;
  const chip=(lbl,rm,c='cyan')=>(
    <button key={lbl} onClick={rm} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 12px',borderRadius:999,fontSize:12,fontWeight:500,border:'1px solid',transition:'all 0.15s',...(c==='violet'?{background:'rgba(139,92,246,0.09)',borderColor:'rgba(139,92,246,0.25)',color:'#7c3aed'}:c==='green'?{background:'#f0fdf4',borderColor:'#bbf7d0',color:'#15803d'}:c==='amber'?{background:'#fef3c7',borderColor:'#fcd34d',color:'#92400e'}:{background:'#e0f7fa',borderColor:'rgba(8,145,178,0.25)',color:'#0891b2'})}}>
      {lbl}<span style={{fontSize:15,lineHeight:1}}>×</span>
    </button>
  );
  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
      {selType&&chip(PRODUCT_TYPES.find(f=>f.value===selType)?.label||selType,()=>setSelType(''))}
      {selCats.map(c=>chip(c,()=>setSelCats(s=>s.filter(x=>x!==c))))}
      {selCompat&&chip(selCompat,()=>setSelCompat(null),'violet')}
      {inStock&&chip('Len skladom',()=>setInStock(false),'green')}
      {maxPrice<500&&chip(`do ${maxPrice} €`,()=>setMaxPrice(500),'amber')}
    </div>
  );
}

// ── PRODUCT CARD ──────────────────────────────────────────────────────────────
function ProductCard({product,index,cart,onAddToCart,onOpen,viewMode}) {
  const qty=cart[product.id]||0;
  const isList=viewMode==='list';
  const stockBadge=()=>{
    if(product.isGroup) return null;
    if(product.stock>5) return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:6,fontSize:11,fontWeight:600,background:'#ecfdf5',color:'#166534'}}><span style={{width:8,height:8,borderRadius:'50%',background:'#10b981'}} />Na sklade</span>;
    if(product.stock>0) return <span style={{padding:'3px 8px',borderRadius:6,fontSize:11,fontWeight:600,background:'#fffbeb',color:'#92400e'}}>Posledné {product.stock} ks</span>;
    return <span style={{padding:'3px 8px',borderRadius:6,fontSize:11,fontWeight:600,background:'#fef2f2',color:'#dc2626'}}>Vypredané</span>;
  };
  return (
    <div className="pcard" style={{position:'relative',background:'#fff',border:'1px solid #e2e8f0',borderRadius:16,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.04)',cursor:'pointer',display:'flex',flexDirection:isList?'row':'column',animation:`fadeUp 0.4s ease-out ${Math.min(index*40,320)}ms both`}} onClick={()=>onOpen(product)}>
      <div style={{width:isList?112:'100%',height:isList?112:192,background:'#f1f5f9',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#f0fdfe,#ecfdf5)'}}>
        <svg className="pimg" width="52" height="52" viewBox="0 0 24 24" fill="#cbd5e1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
      </div>
      {!isList&&<div style={{position:'absolute',top:12,right:12,zIndex:10}}>{stockBadge()}</div>}
      <div style={{padding:'10px 16px 16px',flex:1,display:'flex',flexDirection:'column'}}>
        <div style={{minHeight:isList?'auto':88,marginBottom:8}}>
          <h3 style={{fontSize:13,fontWeight:600,color:'#0f172a',lineHeight:1.4,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',marginBottom:4}}>{product.name}</h3>
          {product.isGroup?(
            <div>
              {product.maskedRef&&<p style={{fontSize:11,color:'#475569',fontWeight:500}}>{product.maskedRef}</p>}
              <p style={{fontSize:11,color:'#0891b2',fontWeight:600}}>{product.variantCount} {getVariantWord(product.variantCount)}</p>
            </div>
          ):product.ref&&<p style={{fontSize:11,color:'#64748b',fontWeight:500}}>{product.ref}</p>}
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:6}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0891b2" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            <span style={{fontSize:11,color:'#0891b2',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{product.cat}</span>
          </div>
        </div>
        <div style={{marginTop:'auto',paddingTop:12,borderTop:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <p style={{fontSize:10,color:'#94a3b8',marginBottom:2}}>bez DPH {product.net} €</p>
            <p style={{fontSize:16,fontWeight:700,background:'linear-gradient(135deg,#0891b2,#059669)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{product.gross} € s DPH</p>
          </div>
          {qty>0?(
            <div style={{display:'inline-flex',alignItems:'center',borderRadius:999,border:'1.5px solid #06b6d4',background:'#e0f7fa',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
              <button onClick={e=>{e.stopPropagation();onAddToCart(product.id,-1);}} style={{width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',background:'none',border:'none',color:'#0891b2',fontSize:16,fontWeight:300}}>−</button>
              <span style={{fontSize:12,fontWeight:700,color:'#0891b2',padding:'0 6px'}}>{qty}</span>
              <button onClick={e=>{e.stopPropagation();onAddToCart(product.id,1);}} style={{width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',background:'none',border:'none',color:'#0891b2',fontSize:16,fontWeight:300}}>+</button>
            </div>
          ):product.stock>0?(
            <button onClick={e=>{e.stopPropagation();onAddToCart(product.id,1);}} style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,#06b6d4,#10b981)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(6,182,212,0.3)',color:'#fff',flexShrink:0}} aria-label="Pridať do košíka">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          ):(
            <button onClick={e=>e.stopPropagation()} style={{fontSize:11,color:'#94a3b8',background:'none',border:'none',textDecoration:'underline'}}>Požiadať</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function DetailPanel({product,onClose,cart,onAddToCart}) {
  const [selVariant,setSelVariant]=useState(VARIANT_OPTIONS[0].ref);
  const [selScrew,setSelScrew]=useState(COMPATIBLE_SCREWS[0].id);
  const qty=cart[product.id]||0;
  const isTiBase=product.type==='tibase';

  return (
    <div style={{position:'fixed',inset:0,zIndex:50}} onClick={onClose}>
      <div style={{position:'absolute',inset:0,background:'rgba(2,6,23,0.5)',backdropFilter:'blur(4px)'}} />
      <div className="detail-panel" style={{position:'absolute',right:0,top:0,bottom:0,width:580,background:'#fff',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'-20px 0 60px rgba(0,0,0,0.15)'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}

          <div style={{display:'flex',gap:8}}>
            <button style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 10px',borderRadius:8,border:'1px solid #e2e8f0',background:'#f8fafc',fontSize:12,fontWeight:500,color:'#475569'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
              Katalóg
            </button>
            <button onClick={onClose} style={{width:32,height:32,borderRadius:8,background:'#f8fafc',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#94a3b8'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>

        <div style={{overflowY:'auto',flex:1}}>
          {/* Image */}
          <div style={{margin:'0 16px 4px',borderRadius:16,height:200,background:'linear-gradient(135deg,#f0fdfe,#ecfdf5)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="80" height="80" viewBox="0 0 24 24" fill="#cbd5e1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
          </div>
          {/* Content */}
          <div style={{padding:'16px 16px 32px'}}>
            <h3 style={{fontSize:22,fontWeight:700,color:'#0f172a',marginBottom:6,lineHeight:1.2}}>{product.name}</h3>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
              {product.isGroup?<span style={{fontSize:13,color:'#64748b',fontWeight:500}}>{product.maskedRef}</span>:product.ref&&<span style={{fontSize:13,color:'#64748b',fontWeight:500}}>{product.ref}</span>}
              <span style={{width:8,height:8,borderRadius:'50%',display:'inline-block',background:product.stock>5?'#10b981':product.stock>0?'#f59e0b':'#ef4444'}} />
              <span style={{fontSize:12,color:'#64748b'}}>{product.stock>0?`${product.stock} ks`:'Vypredané'}</span>
            </div>

              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0891b2" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
              <span style={{fontSize:13,color:'#0891b2',fontWeight:500}}>{product.cat}</span>

            {(product.compat||[]).length>0&&(
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>

              <div style={{marginBottom:20}}>

              <div style={{marginBottom:20}}>

                    </label>

                </div>
              </div>
            )}
            {/* Price + CTA */}

                    <p style={{fontSize:24,fontWeight:700,color:'#0891b2'}}>{product.gross} € <span style={{fontSize:14,fontWeight:400,color:'#64748b'}}>s DPH</span></p>

                </div>
                <div style={{flex:1,minWidth:0}}>
                  {qty>0?(
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      <div style={{display:'flex',alignItems:'center',height:48,borderRadius:8,border:'1px solid #a5f3fc',background:'#e0f7fa',overflow:'hidden'}}>
                        <button onClick={()=>onAddToCart(product.id,-1)} style={{width:48,height:'100%',background:'none',border:'none',color:'#0891b2',fontSize:20,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>
                        <span style={{flex:1,textAlign:'center',fontWeight:700,color:'#0c4a6e',borderLeft:'1px solid #a5f3fc',borderRight:'1px solid #a5f3fc',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',gap:4}}>
                          {qty}<span style={{fontSize:11,color:'#0891b2',fontWeight:400}}>v košíku</span>
                        </span>
                        <button onClick={()=>onAddToCart(product.id,1)} style={{width:48,height:'100%',background:'none',border:'none',color:'#0891b2',fontSize:20,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                      </div>
                      <button onClick={onClose} style={{height:44,borderRadius:8,background:'#0891b2',border:'none',color:'#fff',fontSize:14,fontWeight:600}}>Do košíka →</button>
                    </div>
                  ):product.stock<=0?(
                    <button style={{width:'100%',height:48,borderRadius:8,background:'#64748b',border:'none',color:'#fff',fontSize:14,fontWeight:600}}>Požiadať produkt</button>
                  ):(
                    <button onClick={()=>onAddToCart(product.id,1)} style={{width:'100%',height:48,borderRadius:8,background:'linear-gradient(135deg,#06b6d4,#0891b2)',border:'none',color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                      Pridať do košíka
                    </button>
                  )}
                </div>
              </div>
            </div>
            {/* Description table */}
            <div style={{marginTop:24,borderRadius:8,border:'1px solid #f1f5f9',background:'rgba(248,250,252,0.7)',padding:'12px 20px'}}>
              <dl style={{display:'grid',gap:10}}>
                {[
                  ['Systémy:', product.cat],
                  ...(product.compat?.length?[['Kódy:', product.compat.join(', ')]]:[] ),
                  ['Typ:', product.type.replace(/_/g,' ')],
                  product.isGroup?['Referencie:',product.maskedRef]:['Referencia:',product.ref||'—'],
                ].map(([k,v])=>(
                  <div key={k} style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'0 12px'}}>
                    <dt style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.06em',whiteSpace:'nowrap',paddingTop:2}}>{k}</dt>
                    <dd style={{fontSize:13,color:'#334155',wordBreak:'break-word'}}>{v}</dd>
                  </div>
                ))}
              </dl>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [selType,setSelType]=useState('');
  const [selCats,setSelCats]=useState([]);
  const [selCompat,setSelCompat]=useState(null);
  const [maxPrice,setMaxPrice]=useState(500);
  const [inStock,setInStock]=useState(false);
  const [sortOrder,setSortOrder]=useState('none');
  const [viewMode,setViewMode]=useState('grid');
  const [search,setSearch]=useState('');
  const [selProduct,setSelProduct]=useState(null);
  const [cart,setCart]=useState({});

  const onAddToCart=(id,delta)=>setCart(prev=>{
    const cur=prev[id]||0, next=Math.max(0,cur+delta);
    if(next===0){const{[id]:_,...rest}=prev;return rest;}
    return{...prev,[id]:next};
  });
  const cartCount=Object.values(cart).reduce((s,q)=>s+q,0);

  const filtered=useMemo(()=>{
    let ps=[...PRODUCTS];
    if(selType) ps=ps.filter(p=>p.type===selType);
    if(selCats.length) ps=ps.filter(p=>selCats.includes(p.cat));
    if(selCompat) ps=ps.filter(p=>(p.compat||[]).includes(selCompat));
    if(inStock) ps=ps.filter(p=>p.stock>0);
    if(maxPrice<500) ps=ps.filter(p=>parseFloat(p.gross)<=maxPrice);
    if(search) ps=ps.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||(p.ref||'').toLowerCase().includes(search.toLowerCase())||(p.maskedRef||'').toLowerCase().includes(search.toLowerCase()));
    if(sortOrder==='asc') ps.sort((a,b)=>parseFloat(a.gross)-parseFloat(b.gross));
    if(sortOrder==='desc') ps.sort((a,b)=>parseFloat(b.gross)-parseFloat(a.gross));
    return ps;
  },[selType,selCats,selCompat,inStock,maxPrice,search,sortOrder]);

  const selTypeMeta=PRODUCT_TYPES.find(f=>f.value===selType);

  return (
    <div style={{background:'#f8fafc',fontFamily:'Inter, sans-serif',minHeight:'100vh'}}>
      <Navbar cartCount={cartCount} />
      <Sidebar selType={selType} setSelType={setSelType} selCats={selCats} setSelCats={setSelCats} selCompat={selCompat} setSelCompat={setSelCompat} maxPrice={maxPrice} setMaxPrice={setMaxPrice} inStock={inStock} setInStock={setInStock} />
      <div style={{marginLeft:240}}>
        <Hero />
        <div style={{padding:'40px 40px 80px'}}>
          <SearchBar search={search} setSearch={setSearch} selType={selType} setSelType={setSelType} selCompat={selCompat} setSelCompat={setSelCompat} sortOrder={sortOrder} setSortOrder={setSortOrder} viewMode={viewMode} setViewMode={setViewMode} />
          <FilterChips selType={selType} setSelType={setSelType} selCats={selCats} setSelCats={setSelCats} selCompat={selCompat} setSelCompat={setSelCompat} inStock={inStock} setInStock={setInStock} maxPrice={maxPrice} setMaxPrice={setMaxPrice} />
          <div style={{marginBottom:20}}>
            <h2 style={{fontSize:22,fontWeight:800,color:'#0f172a',letterSpacing:'-0.02em',lineHeight:1}}>Naše produkty</h2>
            <p style={{fontSize:13,color:'#94a3b8',marginTop:4}}>{filtered.length} produktov{selTypeMeta?` typu ${selTypeMeta.label}`:selCats.length>0?` v kategórii ${selCats.join(', ')}`:''}</p>
          </div>
          <div style={viewMode==='list'?{display:'flex',flexDirection:'column',gap:16}:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:20}}>
            {filtered.map((p,i)=><ProductCard key={p.id} product={p} index={i} cart={cart} onAddToCart={onAddToCart} onOpen={setSelProduct} viewMode={viewMode} />)}
          </div>
          {filtered.length===0&&(
            <div style={{textAlign:'center',padding:'80px 20px',background:'#fff',borderRadius:16,border:'1px solid #e2e8f0'}}>
              <p style={{fontSize:16,color:'#64748b'}}>Nenašli sa žiadne produkty vyhovujúce filtrom.</p>
              <button onClick={()=>{setSearch('');setSelCats([]);setSelCompat(null);setSelType('');setSortOrder('none');setMaxPrice(500);setInStock(false);}} style={{marginTop:16,color:'#0891b2',background:'none',border:'none',fontSize:14,fontWeight:500}}>Zrušiť filtre</button>
            </div>
          )}
          {filtered.length>0&&<div style={{textAlign:'center',padding:'32px 0',color:'#94a3b8',fontSize:14}}>Všetky produkty boli načítané.</div>}
        </div>
      </div>
      {selProduct&&<DetailPanel product={selProduct} onClose={()=>setSelProduct(null)} cart={cart} onAddToCart={onAddToCart} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
