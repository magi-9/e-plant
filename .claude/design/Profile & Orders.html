<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Plant – Profil & Objednávky (Mobile)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #060e1e; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: translateX(0); } }
    .fade-up { animation: fadeUp 0.25s ease-out; }
    .slide-in { animation: slideInRight 0.22s ease-out; }
    input, textarea, select { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    @media print {
      body * { visibility: hidden !important; }
      #invoice-print-area, #invoice-print-area * { visibility: visible !important; }
      #invoice-print-area { position: fixed; inset: 0; background: #fff; padding: 32px; z-index: 9999; font-family: 'Inter', sans-serif; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = {
  bg: '#f8fafc', card: '#ffffff', border: '#e2e8f0',
  text: '#0f172a', sub: '#475569', muted: '#94a3b8',
  cyan: '#0891b2', cyanLite: '#e0f7fa',
  grad: 'linear-gradient(135deg, #06b6d4 0%, #10b981 100%)',
  nav: '#020617', navBorder: 'rgba(6,182,212,0.18)',
};

const ORDERS = [
  {
    id: 'ORD-2025-0041', date: '18. apr 2025', status: 'Doručené',
    total: 347.50, items: [
      { name: 'TiBase Ø 4.0', variant: 'Straumann BL – H2.5', qty: 2, price: 89.00 },
      { name: 'Skenovacie telo', variant: 'Nobel Active Ø 5.0', qty: 1, price: 45.50 },
      { name: 'Uhľový Abutment 17°', variant: null, qty: 1, price: 124.00 },
    ],
    shipping: 'DPD Kuriér', shippingCost: 0, invoiceNo: 'FAK-2025-0041',
  },
  {
    id: 'ORD-2025-0038', date: '2. apr 2025', status: 'Doručené',
    total: 214.00, items: [
      { name: 'Healing Abutment Set', variant: 'Universal Ø 4.5', qty: 1, price: 214.00 },
    ],
    shipping: 'Osobný odber', shippingCost: 0, invoiceNo: 'FAK-2025-0038',
  },
  {
    id: 'ORD-2025-0035', date: '14. mar 2025', status: 'Spracováva sa',
    total: 520.00, items: [
      { name: 'Guided Surgery Set', variant: 'Starter Set', qty: 1, price: 320.00 },
      { name: 'TiBase Ø 3.5', variant: 'Nobel Active', qty: 2, price: 100.00 },
    ],
    shipping: 'DPD Kuriér', shippingCost: 0, invoiceNo: 'FAK-2025-0035',
  },
  {
    id: 'ORD-2025-0029', date: '5. feb 2025', status: 'Zrušené',
    total: 89.00, items: [
      { name: 'TiBase Ø 4.0', variant: 'Straumann BL', qty: 1, price: 89.00 },
    ],
    shipping: 'DPD Kuriér', shippingCost: 5.90, invoiceNo: null,
  },
];

const STATUS_CONFIG = {
  'Doručené':      { color: '#10b981', bg: '#d1fae5' },
  'Spracováva sa': { color: '#f59e0b', bg: '#fef3c7' },
  'Odoslané':      { color: C.cyan,    bg: C.cyanLite },
  'Zrušené':       { color: '#ef4444', bg: '#fee2e2' },
};

// ── ATOMS ────────────────────────────────────────────────────
function GBtn({ children, onClick, outline, sm, disabled, full, style = {}, icon }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => setPressed(false)}
      onPointerLeave={() => setPressed(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        padding: sm ? '9px 16px' : '12px 20px',
        width: full ? '100%' : undefined, borderRadius: 9999,
        background: outline ? 'transparent' : disabled ? '#e2e8f0' : C.grad,
        border: outline ? `1.5px solid ${C.cyan}` : 'none',
        color: outline ? C.cyan : disabled ? C.muted : '#fff',
        fontSize: sm ? 12 : 14, fontWeight: 600, fontFamily: 'Inter',
        cursor: disabled ? 'not-allowed' : 'pointer',
        transform: pressed && !disabled ? 'scale(0.96)' : 'scale(1)',
        transition: 'transform 0.1s, box-shadow 0.2s',
        boxShadow: outline || disabled ? 'none' : '0 4px 14px rgba(6,182,212,0.25)',
        letterSpacing: '-0.01em', whiteSpace: 'nowrap', ...style,
      }}>{icon}{children}
    </button>
  );
}

function MobileField({ label, value, onChange, type = 'text', placeholder, readOnly }) {
  const [focus, setFocus] = useState(false);
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={{ fontSize: 10, fontWeight: 600, color: C.muted, display: 'block', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{label}</label>
      <input type={type} value={value} readOnly={readOnly} onChange={e => onChange && onChange(e.target.value)} placeholder={placeholder}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
        style={{
          width: '100%', padding: '11px 14px', borderRadius: 12,
          border: `1.5px solid ${readOnly ? C.border : focus ? C.cyan : C.border}`,
          background: readOnly ? C.bg : C.card, fontSize: 14, color: readOnly ? C.sub : C.text, outline: 'none',
          fontFamily: 'Inter', transition: 'border-color 0.15s',
          boxShadow: focus && !readOnly ? '0 0 0 3px rgba(8,145,178,0.1)' : 'none',
          WebkitAppearance: 'none',
        }}
      />
    </div>
  );
}

function MobileToggle({ value, onChange, label, desc }) {
  return (
    <div onClick={() => onChange(!value)} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 0', borderBottom: `1px solid ${C.border}`, cursor: 'pointer' }}>
      <div style={{ flex: 1, paddingRight: 16 }}>
        <p style={{ fontSize: 14, fontWeight: 500, color: C.text }}>{label}</p>
        {desc && <p style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{desc}</p>}
      </div>
      <div style={{ width: 42, height: 24, borderRadius: 12, flexShrink: 0, background: value ? C.grad : '#cbd5e1', position: 'relative', transition: 'background 0.2s' }}>
        <div style={{ position: 'absolute', top: 2, left: value ? 20 : 2, width: 20, height: 20, borderRadius: '50%', background: '#fff', boxShadow: '0 1px 4px rgba(0,0,0,0.2)', transition: 'left 0.2s' }} />
      </div>
    </div>
  );
}

// ── TOP NAV ──────────────────────────────────────────────────
function AppNav({ title, onBack, rightAction }) {
  return (
    <div style={{ height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 14px', background: C.nav, borderBottom: `1px solid ${C.navBorder}`, flexShrink: 0, position: 'relative' }}>
      <button onClick={onBack} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, padding: '6px 0', minWidth: 56 }}>
        {onBack ? <>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span style={{ fontSize: 13, color: C.cyan, fontWeight: 500 }}>Späť</span>
        </> : <span style={{ fontSize: 15, fontWeight: 800, letterSpacing: '-0.04em', background: C.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>DAS</span>}
      </button>
      <span style={{ fontSize: 14, fontWeight: 700, color: '#fff', position: 'absolute', left: '50%', transform: 'translateX(-50%)' }}>{title}</span>
      <div style={{ minWidth: 56, display: 'flex', justifyContent: 'flex-end' }}>{rightAction}</div>
    </div>
  );
}

// ── INVOICE OVERLAY ──────────────────────────────────────────
function InvoiceOverlay({ order, user, onClose }) {
  const subtotal = order.items.reduce((s, it) => s + it.price * it.qty, 0);
  return (
    <div id="invoice-print-area" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 16px' }}>
        {/* Header */}
        <div style={{ background: C.nav, borderRadius: 16, padding: '20px', marginBottom: 16 }}>
          <div style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.04em', background: C.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: 2 }}>DAS e-shop</div>
          <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)', lineHeight: 1.7 }}>Hlavná 15, 811 01 Bratislava<br/>IČO: 12345678 | das@eshop.sk</p>
          <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid rgba(255,255,255,0.1)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 2 }}>Faktúra</div>
              <div style={{ fontSize: 16, fontWeight: 800, color: '#fff' }}>{order.invoiceNo}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 2 }}>Dátum</div>
              <div style={{ fontSize: 13, color: '#fff', fontWeight: 500 }}>{order.date}</div>
            </div>
          </div>
        </div>

        {/* Billing info */}
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '16px', marginBottom: 16 }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>Odberateľ</div>
          <p style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 2 }}>{user.firstName} {user.lastName}</p>
          <p style={{ fontSize: 12, color: C.sub, lineHeight: 1.8 }}>{user.company}<br/>{user.street}<br/>{user.postal} {user.city}</p>
        </div>

        {/* Items */}
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, overflow: 'hidden', marginBottom: 16 }}>
          <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}` }}>
            <span style={{ fontSize: 10, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Položky</span>
          </div>
          {order.items.map((it, i) => (
            <div key={i} style={{ padding: '12px 16px', borderBottom: i < order.items.length - 1 ? `1px solid ${C.border}` : 'none', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{it.name}</p>
                {it.variant && <p style={{ fontSize: 11, color: C.cyan }}>{it.variant}</p>}
                <p style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{it.qty}× {it.price.toFixed(2)} €</p>
              </div>
              <p style={{ fontSize: 14, fontWeight: 700, color: C.text, flexShrink: 0 }}>{(it.price * it.qty).toFixed(2)} €</p>
            </div>
          ))}
        </div>

        {/* Totals */}
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '16px', marginBottom: 24 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={{ fontSize: 13, color: C.sub }}>Medziúčet</span>
            <span style={{ fontSize: 13, color: C.text }}>{subtotal.toFixed(2)} €</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', paddingBottom: 12, marginBottom: 12, borderBottom: `1px solid ${C.border}` }}>
            <span style={{ fontSize: 13, color: C.sub }}>Doprava</span>
            <span style={{ fontSize: 13, color: order.shippingCost === 0 ? '#10b981' : C.text }}>{order.shippingCost === 0 ? 'Zadarmo' : `${order.shippingCost.toFixed(2)} €`}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 15, fontWeight: 700, color: C.text }}>Celkom</span>
            <span style={{ fontSize: 22, fontWeight: 800, background: C.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{order.total.toFixed(2)} €</span>
          </div>
        </div>
      </div>

      {/* PDF Export Button */}
      <div style={{ padding: '12px 16px 20px', borderTop: `1px solid ${C.border}`, background: C.card, flexShrink: 0 }}>
        <GBtn full onClick={() => window.print()} icon={
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        }>Exportovať PDF</GBtn>
      </div>
    </div>
  );
}

// ── ORDER DETAIL SCREEN ──────────────────────────────────────
function OrderDetail({ order, onBack, onViewInvoice }) {
  const sc = STATUS_CONFIG[order.status] || STATUS_CONFIG['Spracováva sa'];
  return (
    <div className="slide-in" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px' }}>
        {/* Status */}
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '16px', marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <p style={{ fontSize: 11, color: C.muted, marginBottom: 2 }}>Dátum objednávky</p>
            <p style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{order.date}</p>
          </div>
          <span style={{ fontSize: 12, fontWeight: 600, color: sc.color, background: sc.bg, borderRadius: 20, padding: '5px 12px' }}>{order.status}</span>
        </div>

        {/* Items */}
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, overflow: 'hidden', marginBottom: 12 }}>
          <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}` }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.07em' }}>Položky</span>
          </div>
          {order.items.map((it, i) => (
            <div key={i} style={{ display: 'flex', gap: 12, alignItems: 'center', padding: '12px 16px', borderBottom: i < order.items.length - 1 ? `1px solid ${C.border}` : 'none' }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: 'linear-gradient(135deg, #cffafe, #d1fae5)', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 7, color: C.muted, fontFamily: 'monospace', textAlign: 'center', lineHeight: 1.3 }}>product</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 13, fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.name}</p>
                {it.variant && <p style={{ fontSize: 11, color: C.cyan }}>{it.variant}</p>}
                <p style={{ fontSize: 11, color: C.muted }}>{it.qty}× {it.price.toFixed(2)} €</p>
              </div>
              <p style={{ fontSize: 14, fontWeight: 700, color: C.text, flexShrink: 0 }}>{(it.price * it.qty).toFixed(2)} €</p>
            </div>
          ))}
        </div>

        {/* Summary */}
        <div style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '16px', marginBottom: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={{ fontSize: 13, color: C.sub }}>Doprava</span>
            <span style={{ fontSize: 13, color: order.shippingCost === 0 ? '#10b981' : C.text }}>{order.shippingCost === 0 ? 'Zadarmo' : `${order.shippingCost.toFixed(2)} €`}</span>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
            <span style={{ fontSize: 15, fontWeight: 700, color: C.text }}>Celkom</span>
            <span style={{ fontSize: 20, fontWeight: 800, background: C.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{order.total.toFixed(2)} €</span>
          </div>
        </div>
      </div>

      {/* Actions */}
      <div style={{ padding: '12px 16px 20px', borderTop: `1px solid ${C.border}`, background: C.card, display: 'flex', gap: 10 }}>
        {order.invoiceNo && <GBtn outline full onClick={() => onViewInvoice(order)} icon={
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        }>Faktúra</GBtn>}
        <GBtn full onClick={() => {}}>Objednať znovu</GBtn>
      </div>
    </div>
  );
}

// ── ORDERS LIST ──────────────────────────────────────────────
function OrdersList({ onSelectOrder }) {
  return (
    <div className="fade-up" style={{ flex: 1, overflowY: 'auto', padding: '16px' }}>
      {/* Stats */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 16 }}>
        {[
          { label: 'Objednávky', value: ORDERS.length },
          { label: 'Doručené', value: ORDERS.filter(o => o.status === 'Doručené').length },
        ].map(s => (
          <div key={s.label} style={{ flex: 1, background: C.card, borderRadius: 14, border: `1px solid ${C.border}`, padding: '12px 14px' }}>
            <p style={{ fontSize: 10, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 4 }}>{s.label}</p>
            <p style={{ fontSize: 22, fontWeight: 800, color: C.text }}>{s.value}</p>
          </div>
        ))}
      </div>

      {/* Orders */}
      {ORDERS.map(order => {
        const sc = STATUS_CONFIG[order.status] || STATUS_CONFIG['Spracováva sa'];
        return (
          <div key={order.id} onClick={() => onSelectOrder(order)} style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '14px 16px', marginBottom: 10, cursor: 'pointer', boxShadow: '0 1px 4px rgba(0,0,0,0.04)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
              <div>
                <p style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{order.id}</p>
                <p style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{order.date}</p>
              </div>
              <span style={{ fontSize: 11, fontWeight: 600, color: sc.color, background: sc.bg, borderRadius: 20, padding: '3px 10px', flexShrink: 0, marginLeft: 8 }}>{order.status}</span>
            </div>
            <p style={{ fontSize: 12, color: C.sub, marginBottom: 8 }}>
              {order.items.slice(0, 2).map(it => it.name).join(', ')}
              {order.items.length > 2 ? ` +${order.items.length - 2}` : ''}
            </p>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ display: 'flex', gap: 4 }}>
                {order.items.map((_, i) => <div key={i} style={{ width: 24, height: 24, borderRadius: 6, background: 'linear-gradient(135deg, #cffafe, #d1fae5)', border: `1px solid ${C.border}` }} />)}
              </div>
              <p style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{order.total.toFixed(2)} €</p>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── PROFILE SETTINGS ────────────────────────────────────────
function ProfileSettings({ user, setUser }) {
  const [saved, setSaved] = useState(false);

  function save() { setSaved(true); setTimeout(() => setSaved(false), 2200); }

  return (
    <div className="fade-up" style={{ flex: 1, overflowY: 'auto', padding: '16px' }}>

      {/* Sections */}
      {[
        {
          title: 'Osobné údaje',
          content: <>
            <div style={{ display: 'flex', gap: 10 }}>
              <div style={{ flex: 1 }}><MobileField label="Meno" value={user.firstName} onChange={v => setUser({ ...user, firstName: v })} /></div>
              <div style={{ flex: 1 }}><MobileField label="Priezvisko" value={user.lastName} onChange={v => setUser({ ...user, lastName: v })} /></div>
            </div>
            <MobileField label="E-mail" value={user.email} onChange={v => setUser({ ...user, email: v })} />
            <MobileField label="Telefón" value={user.phone} onChange={v => setUser({ ...user, phone: v })} />
            <MobileField label="Spoločnosť" value={user.company} onChange={v => setUser({ ...user, company: v })} />
          </>
        },
        {
          title: 'Fakturačná adresa',
          content: <>
            <MobileField label="Ulica a číslo" value={user.street} onChange={v => setUser({ ...user, street: v })} />
            <div style={{ display: 'flex', gap: 10 }}>
              <div style={{ flex: 2 }}><MobileField label="Mesto" value={user.city} onChange={v => setUser({ ...user, city: v })} /></div>
              <div style={{ flex: 1 }}><MobileField label="PSČ" value={user.postal} onChange={v => setUser({ ...user, postal: v })} /></div>
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <div style={{ flex: 1 }}><MobileField label="IČO" value={user.ico} onChange={v => setUser({ ...user, ico: v })} /></div>
              <div style={{ flex: 1 }}><MobileField label="DIČ" value={user.dic} onChange={v => setUser({ ...user, dic: v })} /></div>
            </div>
          </>
        },
        {
          title: 'Zmena hesla',
          content: <>
            <MobileField label="Aktuálne heslo" type="password" placeholder="••••••••" />
            <MobileField label="Nové heslo" type="password" placeholder="••••••••" />
            <MobileField label="Potvrdiť heslo" type="password" placeholder="••••••••" />
          </>
        },
      ].map(section => (
        <div key={section.title} style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '16px', marginBottom: 12 }}>
          <p style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 14 }}>{section.title}</p>
          {section.content}
        </div>
      ))}

      <GBtn full onClick={save}>
        {saved ? (
          <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Uložené!</>
        ) : 'Uložiť zmeny'}
      </GBtn>
    </div>
  );
}

// ── HOME ─────────────────────────────────────────────────────
function HomeMenu({ onNav, user }) {
  const items = [
    { id: 'profile', label: 'Nastavenia profilu', sub: 'Osobné údaje, adresa, heslo', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.cyan} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
    { id: 'orders', label: 'Moje objednávky', sub: `${ORDERS.length} objednávok`, icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.cyan} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>, badge: ORDERS.length },
  ];

  return (
    <div className="fade-up" style={{ flex: 1, overflowY: 'auto', padding: '20px 16px' }}>
      {/* User card — no avatar */}
      <div style={{ background: C.nav, borderRadius: 20, padding: '20px', marginBottom: 20 }}>
        <p style={{ fontSize: 16, fontWeight: 700, color: '#fff' }}>{user.firstName} {user.lastName}</p>
        <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.5)', marginTop: 2 }}>{user.email}</p>
        <div style={{ marginTop: 10, display: 'inline-block', background: 'rgba(6,182,212,0.2)', borderRadius: 10, padding: '3px 10px' }}>
          <span style={{ fontSize: 10, fontWeight: 600, color: C.cyan }}>Overený zákazník</span>
        </div>
      </div>

      {/* Menu items */}
      {items.map((item) => (
        <div key={item.id} onClick={() => onNav(item.id)} style={{ background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '16px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer', boxShadow: '0 1px 4px rgba(0,0,0,0.04)' }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: C.cyanLite, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{item.icon}</div>
          <div style={{ flex: 1 }}>
            <p style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{item.label}</p>
            <p style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{item.sub}</p>
          </div>
          {item.badge && <span style={{ fontSize: 11, fontWeight: 700, color: '#fff', background: C.cyan, borderRadius: 20, padding: '2px 8px', flexShrink: 0 }}>{item.badge}</span>}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      ))}

      {/* Logout */}
      <button style={{ marginTop: 8, width: '100%', padding: '14px', borderRadius: 14, border: `1px solid #fee2e2`, background: '#fff5f5', color: '#ef4444', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Odhlásiť sa
      </button>
    </div>
  );
}



// ── APP ──────────────────────────────────────────────────────
function App() {
  // screen: 'home' | 'orders' | 'orderDetail' | 'invoice' | 'profile'
  const [screen, setScreen] = useState('home');
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [invoiceOrder, setInvoiceOrder] = useState(null);
  const [user, setUser] = useState({
    firstName: 'Marek', lastName: 'Novák',
    email: 'marek.novak@dasklinika.sk',
    phone: '+421 900 123 456',
    company: 'DAS Klinika s.r.o.',
    street: 'Hlavná 15',
    city: 'Bratislava',
    postal: '811 01',
    ico: '12345678',
    dic: '2023456789',
  });

  function goHome() { setScreen('home'); setSelectedOrder(null); setInvoiceOrder(null); }

  const TITLES = { home: 'Môj účet', orders: 'Objednávky', orderDetail: selectedOrder?.id || '', invoice: 'Faktúra', profile: 'Nastavenia profilu' };

  // Back button logic per screen
  const BACK = {
    home: null,
    orders: goHome,
    orderDetail: () => { setSelectedOrder(null); setScreen('orders'); },
    invoice: () => { setInvoiceOrder(null); setScreen('orderDetail'); },
    profile: goHome,
  };

  // Right nav button (account icon on home)
  const rightAction = screen === 'home'
    ? <button onClick={() => setScreen('profile')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    : null;

  return (
    <IOSDevice width={393} height={852} dark={true}>
      <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: C.bg, position: 'relative', overflow: 'hidden' }}>
        <AppNav title={TITLES[screen]} onBack={BACK[screen]} rightAction={rightAction} />

        <div style={{ flex: 1, position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {screen === 'home' && <HomeMenu user={user} onNav={id => setScreen(id)} />}
          {screen === 'orders' && <OrdersList onSelectOrder={o => { setSelectedOrder(o); setScreen('orderDetail'); }} />}
          {screen === 'orderDetail' && selectedOrder && <OrderDetail order={selectedOrder} onBack={() => setScreen('orders')} onViewInvoice={o => { setInvoiceOrder(o); setScreen('invoice'); }} />}
          {screen === 'invoice' && invoiceOrder && <InvoiceOverlay order={invoiceOrder} user={user} onClose={() => setScreen('orderDetail')} />}
          {screen === 'profile' && <ProfileSettings user={user} setUser={setUser} />}
        </div>
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
