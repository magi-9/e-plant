<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Plant Admin – Produkty</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f6f8fb;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }
    code { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    input, textarea, select, button { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    ::-webkit-scrollbar-track { background: transparent; }

    @keyframes modalIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalSlide { from { opacity: 0; transform: translateY(20px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="admin-shared.jsx"></script>
  <script type="text/babel" src="admin-products-list.jsx"></script>
  <script type="text/babel" src="admin-products-edit.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState: useStateApp, useMemo: useMemoApp } = React;

    function App() {
      const [products, setProducts] = useStateApp(() => PRODUCTS_SEED);
      const [editingId, setEditingId] = useStateApp(null);
      const [creatingNew, setCreatingNew] = useStateApp(false);
      const [toast, setToast] = useStateApp(null);

      // Live-extracted categories and compat sets (union of seed + product values)
      const allCategories = useMemoApp(() => {
        const s = new Set(CATEGORIES_SEED);
        products.forEach(p => p.cats.forEach(c => s.add(c)));
        return [...s].sort();
      }, [products]);

      const allCompat = useMemoApp(() => {
        const s = new Set(COMPAT_SEED);
        products.forEach(p => (p.compat || []).forEach(c => s.add(c)));
        return [...s].sort();
      }, [products]);

      const allRefs = useMemoApp(() => products.map(p => p.ref), [products]);

      function notify(msg, tone = 'ok') {
        setToast({ msg, tone, id: Date.now() });
        setTimeout(() => setToast(t => (t && t.id === Date.now()) ? null : t), 2800);
      }

      const editing = editingId != null ? products.find(p => p.id === editingId) : creatingNew ? { __new: true } : null;

      function handleSave(updated) {
        if (creatingNew) {
          setProducts(ps => [...ps, updated]);
          setCreatingNew(false);
          notify(`Vytvorené: ${updated.name}`);
        } else {
          setProducts(ps => ps.map(p => p.id === updated.id ? updated : p));
          setEditingId(null);
          notify(`Uložené: ${updated.name}`);
        }
      }

      function handleDuplicate(id) {
        const src = products.find(p => p.id === id);
        if (!src) return;
        const copy = {
          ...src,
          id: Math.max(0, ...products.map(p => p.id)) + 1,
          ref: src.ref + '-COPY',
          name: src.name + ' (kópia)',
          visible: false,
        };
        setProducts(ps => [...ps, copy]);
        notify(`Duplikované: ${src.name}`);
      }

      function handleToggleVisible(id) {
        setProducts(ps => ps.map(p => p.id === id ? { ...p, visible: !p.visible } : p));
      }

      function handleDelete(id) {
        const p = products.find(x => x.id === id);
        setProducts(ps => ps.filter(x => x.id !== id));
        notify(`Vymazané: ${p?.name || ''}`, 'warn');
      }

      function handleBulk(action, ids, payload) {
        if (action === 'show') setProducts(ps => ps.map(p => ids.includes(p.id) ? { ...p, visible: true } : p));
        else if (action === 'hide') setProducts(ps => ps.map(p => ids.includes(p.id) ? { ...p, visible: false } : p));
        else if (action === 'delete') setProducts(ps => ps.filter(p => !ids.includes(p.id)));
        else if (action === 'cats') setProducts(ps => ps.map(p => ids.includes(p.id) ? { ...p, cats: payload } : p));
        notify(`Hromadná akcia (${ids.length})`);
      }

      return (
        <div style={{ minHeight: '100vh', background: C.bg }}>
          {/* Top nav */}
          <nav style={{
            position:'sticky', top: 0, zIndex: 50, height: 60,
            background: C.nav, borderBottom: `1px solid ${C.navBorder}`,
          }}>
            <div style={{ maxWidth: 1440, margin:'0 auto', padding:'0 32px', height:'100%', display:'flex', alignItems:'center', gap: 28 }}>
              <span style={{
                fontWeight: 800, fontSize: 17, letterSpacing:'-0.04em',
                background: C.grad, WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
              }}>E-Plant · Admin</span>
              <div style={{ display:'flex', alignItems:'center', gap: 2 }}>
                <NavTab active>Produkty</NavTab>
                <NavTab>Sklad</NavTab>
                <NavTab>Objednávky</NavTab>
                <NavTab>Zákazníci</NavTab>
                <NavTab>Nastavenia</NavTab>
              </div>
              <div style={{ flex: 1 }}/>
              <div style={{ display:'flex', alignItems:'center', gap: 10 }}>
                <span style={{ fontSize: 12.5, color:'rgba(255,255,255,0.55)' }}>admin@eplant.sk</span>
                <div style={{
                  width: 30, height: 30, borderRadius:'50%', background: C.grad,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  color:'#fff', fontSize: 12, fontWeight: 700,
                }}>AD</div>
              </div>
            </div>
          </nav>

          <ProductsList
            products={products}
            onEdit={id => setEditingId(id)}
            onDuplicate={handleDuplicate}
            onToggleVisible={handleToggleVisible}
            onDelete={handleDelete}
            onBulk={handleBulk}
            onNew={() => setCreatingNew(true)}
          />

          {editing && (
            <EditModal
              product={editing.__new ? null : editing}
              onClose={() => { setEditingId(null); setCreatingNew(false); }}
              onSave={handleSave}
              allCategories={allCategories}
              allCompat={allCompat}
              allRefs={allRefs.filter(r => !editing.__new ? r !== editing.ref : true)}
            />
          )}

          {toast && (
            <div style={{
              position:'fixed', bottom: 24, left:'50%', transform:'translateX(-50%)',
              background: C.text, color:'#fff', padding:'11px 18px',
              borderRadius: 10, fontSize: 13, fontWeight: 600,
              boxShadow:'0 12px 32px rgba(15,23,42,0.25)',
              animation:'toastIn 0.25s cubic-bezier(0.2,0.9,0.3,1)',
              zIndex: 300, display:'flex', alignItems:'center', gap: 10,
            }}>
              <span style={{
                width: 8, height: 8, borderRadius:'50%',
                background: toast.tone === 'warn' ? C.warn : C.emerald,
              }}/>
              {toast.msg}
            </div>
          )}
        </div>
      );
    }

    function NavTab({ children, active }) {
      const [hov, setHov] = useStateApp(false);
      return (
        <a href="#"
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{
            padding:'7px 14px', borderRadius: 8,
            fontSize: 13.5, fontWeight: active ? 700 : 500,
            color: active ? '#fff' : hov ? '#fff' : 'rgba(255,255,255,0.6)',
            background: active ? 'rgba(6,182,212,0.15)' : hov ? 'rgba(255,255,255,0.05)' : 'transparent',
            textDecoration:'none', transition:'all 0.12s',
            border: active ? '1px solid rgba(6,182,212,0.30)' : '1px solid transparent',
          }}>
          {children}
        </a>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
