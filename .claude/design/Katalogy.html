<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalógy — Dynamic Abutment Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  .catGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .featRow{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;align-items:stretch}
  @media(max-width:1000px){.catGrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:760px){.featRow{grid-template-columns:1fr}}
  @media(max-width:560px){.catGrid{grid-template-columns:1fr}.kh1{font-size:30px!important;line-height:36px!important}}
  .catCard{transition:transform .2s,box-shadow .2s,border-color .2s}
  .catCard:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(15,23,42,.10);border-color:#cfe6fb}
  .chip{height:38px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--line2);background:#fff;color:var(--ink2);white-space:nowrap;transition:all .15s}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chipRow{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .chipRow::-webkit-scrollbar{height:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="shop-data.js"></script>
<script type="text/babel" src="shop-ui.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

const CATS=[['all','Všetky'],['tibase','TiBase'],['mua','Multi-Unit'],['scanbody','Scanbody'],['surgery','Chirurgia'],['price','Cenníky']];
const COLORS={tibase:['#eaf4fe','#1565c0'],mua:['#f1fbf6','#1f9d55'],scanbody:['#f6f0fd','#6b3fa0'],surgery:['#fff4ed','#c2410c'],price:['#fef3f2','#a51b3f'],all:['#eef2f6','#45474c']};

const CATALOGS=[
  {id:1,cat:'tibase',tag:'TiBase',title:'Dynamic TiBase — kompletný katalóg',desc:'Uhlové a rovné TiBase, kompatibilita s 80+ systémami.',pages:84,year:2026,size:'12,4 MB',feat:true},
  {id:2,cat:'mua',tag:'Multi-Unit',title:'Multi-Unit Abutment Systems',desc:'Rovné a uhlové Multi-Unit abutmenty, príslušenstvo.',pages:56,year:2026,size:'8,1 MB'},
  {id:3,cat:'scanbody',tag:'Scanbody',title:'Scanbody & digitálny workflow',desc:'Skenovacie telá, CAD/CAM knižnice a postupy.',pages:38,year:2026,size:'6,3 MB'},
  {id:4,cat:'surgery',tag:'Chirurgia',title:'Vedená chirurgia & kity',desc:'Komponenty pre riadenú chirurgiu a plánovanie.',pages:42,year:2025,size:'9,0 MB'},
  {id:5,cat:'tibase',tag:'Analógy',title:'Analógy & príslušenstvo',desc:'Laboratórne analógy, skrutky a nástroje.',pages:24,year:2025,size:'4,2 MB'},
  {id:6,cat:'price',tag:'Cenník',title:'Cenník 2026 — členské ceny',desc:'Aktuálne partnerské ceny celého sortimentu.',pages:18,year:2026,size:'1,1 MB'},
  {id:7,cat:'scanbody',tag:'CAD/CAM',title:'CAD/CAM knižnice (.stl / .dme)',desc:'Stiahnuteľné knižnice pre exocad a 3Shape.',pages:null,year:2026,size:'ZIP 320 MB'},
  {id:8,cat:'price',tag:'Referencia',title:'Kompatibilita — referenčná tabuľka',desc:'Prehľad kódov a kompatibility implantátov.',pages:12,year:2026,size:'0,9 MB'},
];

function CoverArt({c,big}){
  const [bg,fg]=COLORS[c.cat]||COLORS.all;
  return (
    <div style={{position:'relative',height:big?'100%':188,minHeight:big?260:0,background:bg,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
      <div style={{position:'relative',textAlign:'center',padding:24}}>
        <div style={{width:54,height:66,margin:'0 auto',borderRadius:'4px 8px 8px 4px',background:'#fff',boxShadow:`0 8px 20px ${fg}33`,borderLeft:`4px solid ${fg}`,display:'flex',alignItems:'center',justifyContent:'center',color:fg}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 8h10M7 12h10M7 16h6"/></svg>
        </div>
        <span style={{display:'inline-block',marginTop:14,fontSize:11,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:fg}}>{c.tag}</span>
      </div>
    </div>
  );
}

function Card({c,onOpen}){
  return (
    <article className="catCard" style={{display:'flex',flexDirection:'column',background:'#fff',border:'1px solid var(--line2)',borderRadius:16,overflow:'hidden'}}>
      <div style={{borderBottom:'1px solid var(--line)'}}><CoverArt c={c}/></div>
      <div style={{padding:18,display:'flex',flexDirection:'column',flex:1}}>
        <h3 style={{fontSize:16,fontWeight:700,lineHeight:'21px'}}>{c.title}</h3>
        <p style={{marginTop:8,fontSize:13,lineHeight:'19px',color:'var(--ink2)',flex:1}}>{c.desc}</p>
        <div style={{marginTop:12,display:'flex',gap:10,flexWrap:'wrap',fontSize:12,color:'var(--muted)'}}>
          {c.pages&&<span>{c.pages} strán</span>}{c.pages&&<span>·</span>}<span>{c.year}</span><span>·</span><span className="mono">{c.size}</span>
        </div>
        <div style={{marginTop:16,display:'flex',gap:10}}>
          <button onClick={()=>onOpen(c)} style={{flex:1,height:44,borderRadius:10,background:'var(--blue)',color:'#fff',fontSize:14,fontWeight:700}}>Zobraziť</button>
          <button onClick={()=>onOpen(c)} aria-label="Stiahnuť" style={{width:44,height:44,borderRadius:10,border:'1px solid var(--line2)',background:'#fff',color:'var(--ink2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>
          </button>
        </div>
      </div>
    </article>
  );
}

function Viewer({c,onClose}){
  const [bg,fg]=COLORS[c.cat]||COLORS.all;
  return (
    <div style={{position:'fixed',inset:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(15,18,22,.55)',animation:'overlayIn .2s ease'}}/>
      <div style={{position:'relative',width:'min(560px,100%)',background:'#fff',borderRadius:20,overflow:'hidden',animation:'popIn .2s ease',boxShadow:'0 30px 70px rgba(0,0,0,.3)'}}>
        <div style={{height:220,position:'relative'}}><CoverArt c={c} big/>
          <button onClick={onClose} style={{position:'absolute',top:14,right:14,width:38,height:38,borderRadius:10,background:'rgba(255,255,255,.92)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--ink)'}}><I.close/></button>
        </div>
        <div style={{padding:'22px 24px'}}>
          <span style={{fontSize:11,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:fg}}>{c.tag}</span>
          <h3 style={{marginTop:8,fontSize:21,fontWeight:700,lineHeight:'27px'}}>{c.title}</h3>
          <p style={{marginTop:8,fontSize:14,color:'var(--ink2)',lineHeight:'21px'}}>{c.desc}</p>
          <div style={{marginTop:14,display:'flex',gap:10,flexWrap:'wrap',fontSize:13,color:'var(--muted)'}}>{c.pages&&<span>{c.pages} strán</span>}{c.pages&&<span>·</span>}<span>Vydanie {c.year}</span><span>·</span><span className="mono">{c.size}</span></div>
          <div style={{marginTop:18,padding:'14px 16px',borderRadius:12,background:'#eaf4fe',border:'1px solid #cfe6fb',fontSize:13,color:'var(--blue-d)',lineHeight:'19px'}}>Ukážkový náhľad. Po nasadení sa tu otvorí PDF prehliadač katalógu.</div>
          <div style={{marginTop:18,display:'flex',gap:10}}>
            <a href="#" style={{flex:1,height:48,borderRadius:12,background:'var(--blue)',color:'#fff',fontSize:14,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>Stiahnuť PDF</a>
            <a href="Produkty.html" style={{flex:1,height:48,borderRadius:12,border:'1px solid var(--line2)',background:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center'}}>Pozrieť produkty</a>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [menu,setMenu]=useState(false);
  const [cat,setCat]=useState('all');
  const [open,setOpen]=useState(null);
  const list=useMemo(()=>cat==='all'?CATALOGS:CATALOGS.filter(c=>c.cat===cat),[cat]);
  const feat=CATALOGS.find(c=>c.feat);
  return (
    <div>
      <Header active="katalogy" onMenu={()=>setMenu(true)}/>
      <MobileNav open={menu} onClose={()=>setMenu(false)} active="katalogy"/>
      <main className="wrap" style={{paddingTop:32,paddingBottom:8}}>
        <section style={{background:'var(--card)',borderRadius:20,padding:32,boxShadow:'inset 0 0 0 1px rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.05)'}}>
          <span style={{fontSize:12,fontWeight:700,letterSpacing:'.6px',color:'var(--blue)'}}>KATALÓGY &amp; CENNÍKY</span>
          <h1 className="kh1" style={{marginTop:10,fontSize:38,lineHeight:'46px',fontWeight:700,letterSpacing:'-0.8px'}}>Produktové katalógy Dynamic Abutment Solutions</h1>
          <p style={{marginTop:10,maxWidth:680,fontSize:17,lineHeight:'27px',color:'var(--ink2)'}}>Stiahnite si kompletné katalógy, cenníky a CAD/CAM knižnice. Všetky materiály sú pravidelne aktualizované podľa najnovšieho sortimentu.</p>
        </section>

        {/* featured */}
        {feat&&(
          <section style={{marginTop:24}}>
            <div className="featRow" style={{background:'#fff',border:'1px solid var(--line2)',borderRadius:18,overflow:'hidden'}}>
              <div style={{minHeight:260,borderRight:'1px solid var(--line)'}}><CoverArt c={feat} big/></div>
              <div style={{padding:'28px 30px',display:'flex',flexDirection:'column',justifyContent:'center'}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--blue-d)'}}><I.badge style={{color:'var(--blue)'}}/>Odporúčaný katalóg</span>
                <h2 style={{marginTop:12,fontSize:26,fontWeight:700,lineHeight:'33px'}}>{feat.title}</h2>
                <p style={{marginTop:10,fontSize:15,lineHeight:'23px',color:'var(--ink2)'}}>{feat.desc}</p>
                <div style={{marginTop:14,display:'flex',gap:10,flexWrap:'wrap',fontSize:13,color:'var(--muted)'}}><span>{feat.pages} strán</span><span>·</span><span>Vydanie {feat.year}</span><span>·</span><span className="mono">{feat.size}</span></div>
                <div style={{marginTop:20,display:'flex',gap:10,flexWrap:'wrap'}}>
                  <button onClick={()=>setOpen(feat)} style={{height:48,padding:'0 24px',borderRadius:12,background:'var(--blue)',color:'#fff',fontSize:14,fontWeight:700}}>Zobraziť katalóg</button>
                  <button onClick={()=>setOpen(feat)} style={{height:48,padding:'0 20px',borderRadius:12,border:'1px solid var(--line2)',background:'#fff',fontSize:14,fontWeight:600,display:'inline-flex',alignItems:'center',gap:8}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>Stiahnuť PDF</button>
                </div>
              </div>
            </div>
          </section>
        )}

        {/* filter chips */}
        <div className="chipRow" style={{marginTop:28}}>
          {CATS.map(([k,l])=><button key={k} className={'chip'+(cat===k?' on':'')} onClick={()=>setCat(k)}>{l}</button>)}
        </div>

        <p style={{margin:'18px 0 16px',fontSize:14,color:'var(--ink2)'}}><b>{list.length}</b> {list.length===1?'katalóg':(list.length<5?'katalógy':'katalógov')}</p>

        <div className="catGrid">{list.map(c=><Card key={c.id} c={c} onOpen={setOpen}/>)}</div>
      </main>
      <Footer/>
      {open&&<Viewer c={open} onClose={()=>setOpen(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
