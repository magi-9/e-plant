<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Plant – Profil & Objednávky</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; -webkit-font-smoothing: antialiased; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
    .fade-up { animation: fadeUp 0.25s ease-out; }
    input, textarea, select { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    @media print {
      body * { visibility: hidden !important; }
      #invoice-print-area, #invoice-print-area * { visibility: visible !important; }
      #invoice-print-area { position: fixed; inset: 0; background: #fff; padding: 48px; z-index: 9999; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = {
  bg: '#f8fafc', card: '#ffffff', border: '#e2e8f0',
  text: '#0f172a', sub: '#475569', muted: '#94a3b8',
  cyan: '#0891b2', cyanLite: '#e0f7fa',
  grad: 'linear-gradient(135deg, #06b6d4 0%, #10b981 100%)',
  nav: '#020617', navBorder: 'rgba(6,182,212,0.18)',
};

// ── MOCK DATA ────────────────────────────────────────────────
const ORDERS = [
  {
    id: 'ORD-2024-0041', date: '18. apr 2025', status: 'Doručené',
    total: 347.50, items: [
      { name: 'TiBase Ø 4.0', variant: 'Straumann BL – H2.5', qty: 2, price: 89.00 },
      { name: 'Skenovacie telo', variant: 'Nobel Active Ø 5.0', qty: 1, price: 45.50 },
      { name: 'Uhľový Abutment 17°', variant: null, qty: 1, price: 124.00 },
    ],
    shipping: 'DPD Kuriér', shippingCost: 0, invoiceNo: 'FAK-2025-0041',
  },
  {
    id: 'ORD-2024-0038', date: '2. apr 2025', status: 'Doručené',
    total: 214.00, items: [
      { name: 'Healing Abutment Set', variant: 'Universal Ø 4.5', qty: 1, price: 214.00 },
    ],
    shipping: 'Osobný odber', shippingCost: 0, invoiceNo: 'FAK-2025-0038',
  },
  {
    id: 'ORD-2024-0035', date: '14. mar 2025', status: 'Spracováva sa',
    total: 520.00, items: [
      { name: 'Guided Surgery Set', variant: 'Starter Set (3 impl.)', qty: 1, price: 320.00 },
      { name: 'TiBase Ø 3.5', variant: 'Nobel Active', qty: 2, price: 100.00 },
    ],
    shipping: 'DPD Kuriér', shippingCost: 0, invoiceNo: 'FAK-2025-0035',
  },
  {
    id: 'ORD-2024-0029', date: '5. feb 2025', status: 'Zrušené',
    total: 89.00, items: [
      { name: 'TiBase Ø 4.0', variant: 'Straumann BL', qty: 1, price: 89.00 },
    ],
    shipping: 'DPD Kuriér', shippingCost: 5.90, invoiceNo: null,
  },
];

const STATUS_CONFIG = {
  'Doručené':      { color: '#10b981', bg: '#d1fae5', dot: '#10b981' },
  'Spracováva sa': { color: '#f59e0b', bg: '#fef3c7', dot: '#f59e0b' },
  'Odoslané':      { color: '#0891b2', bg: '#e0f7fa', dot: '#0891b2' },
  'Zrušené':       { color: '#ef4444', bg: '#fee2e2', dot: '#ef4444' },
};

// ── ATOMS ────────────────────────────────────────────────────
function GBtn({ children, onClick, outline, sm, lg, disabled, full, style = {}, icon }) {
  const [hov, setHov] = useState(false);
  const [pressed, setPressed] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => { setHov(false); setPressed(false); }}
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 7,
        padding: lg ? '13px 28px' : sm ? '8px 16px' : '10px 20px',
        width: full ? '100%' : undefined, borderRadius: 9999,
        background: outline ? 'transparent' : disabled ? '#e2e8f0' : C.grad,
        border: outline ? `1.5px solid ${C.cyan}` : 'none',
        color: outline ? C.cyan : disabled ? C.muted : '#fff',
        fontSize: lg ? 15 : sm ? 12 : 14, fontWeight: 600, fontFamily: 'Inter',
        cursor: disabled ? 'not-allowed' : 'pointer',
        transform: pressed && !disabled ? 'scale(0.97)' : 'scale(1)',
        transition: 'transform 0.1s, box-shadow 0.2s, opacity 0.15s',
        boxShadow: outline || disabled ? 'none' : hov ? '0 6px 20px rgba(6,182,212,0.35)' : '0 4px 14px rgba(6,182,212,0.22)',
        opacity: disabled ? 0.5 : 1,
        letterSpacing: '-0.01em', whiteSpace: 'nowrap', ...style,
      }}>{icon}{children}
    </button>
  );
}

function Field({ label, value, onChange, type = 'text', placeholder, half, readOnly }) {
  const [focus, setFocus] = useState(false);
  return (
    <div style={{ flex: half ? '1 1 45%' : '1 1 100%', minWidth: 0 }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: C.sub, display: 'block', marginBottom: 5, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{label}</label>
      <input type={type} value={value} readOnly={readOnly} onChange={e => onChange && onChange(e.target.value)} placeholder={placeholder}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
        style={{
          width: '100%', padding: '10px 14px', borderRadius: 10,
          border: `1.5px solid ${readOnly ? C.border : focus ? C.cyan : C.border}`,
          background: readOnly ? C.bg : C.card, fontSize: 14, color: readOnly ? C.sub : C.text, outline: 'none',
          fontFamily: 'Inter', transition: 'border-color 0.15s, box-shadow 0.15s',
          boxShadow: focus && !readOnly ? '0 0 0 3px rgba(8,145,178,0.1)' : 'none',
        }}
      />
    </div>
  );
}

function Toggle({ value, onChange, label, desc }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 0', borderBottom: `1px solid ${C.border}` }}>
      <div>
        <p style={{ fontSize: 14, fontWeight: 500, color: C.text }}>{label}</p>
        {desc && <p style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{desc}</p>}
      </div>
      <div onClick={() => onChange(!value)} style={{
        width: 44, height: 26, borderRadius: 13, cursor: 'pointer', flexShrink: 0,
        background: value ? C.grad : '#cbd5e1',
        position: 'relative', transition: 'background 0.2s',
      }}>
        <div style={{ position: 'absolute', top: 3, left: value ? 21 : 3, width: 20, height: 20, borderRadius: '50%', background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,0.18)', transition: 'left 0.2s' }} />
      </div>
    </div>
  );
}

function SectionCard({ title, subtitle, children, action }) {
  return (
    <div style={{ background: C.card, borderRadius: 20, border: `1px solid ${C.border}`, overflow: 'hidden', boxShadow: '0 1px 8px rgba(0,0,0,0.04)', marginBottom: 20 }}>
      <div style={{ padding: '20px 24px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <h3 style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{title}</h3>
          {subtitle && <p style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{subtitle}</p>}
        </div>
        {action}
      </div>
      <div style={{ padding: '20px 24px' }}>{children}</div>
    </div>
  );
}

// ── NAVBAR ───────────────────────────────────────────────────
function Navbar() {
  return (
    <nav style={{ position: 'sticky', top: 0, zIndex: 100, background: C.nav, borderBottom: `1px solid ${C.navBorder}`, height: 64 }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
          <span style={{ fontWeight: 800, fontSize: 18, letterSpacing: '-0.05em', background: C.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>DAS</span>
          <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.3)' }}>e-shop</span>
          {['Produkty', 'O nás', 'Kontakt'].map((l, i) => (
            <a key={l} href="#" style={{ fontSize: 13, color: i === 0 ? '#fff' : 'rgba(255,255,255,0.45)', fontWeight: i === 0 ? 600 : 400, textDecoration: 'none' }}>{l}</a>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <button style={{ background: 'rgba(6,182,212,0.1)', border: '1px solid rgba(6,182,212,0.25)', borderRadius: 10, padding: '8px 14px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <span style={{ fontSize: 13, color: '#fff', fontWeight: 600 }}>3</span>
          </button>
          {/* Avatar */}
          <div style={{ width: 34, height: 34, borderRadius: '50%', background: C.grad, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: '#fff' }}>MN</span>
          </div>
        </div>
      </div>
    </nav>
  );
}

// ── INVOICE PRINT AREA ───────────────────────────────────────
function InvoicePrint({ order, user, onClose }) {
  const subtotal = order.items.reduce((s, it) => s + it.price * it.qty, 0);
  return (
    <div id="invoice-print-area" style={{ position: 'fixed', inset: 0, background: 'rgba(2,6,23,0.7)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={{ background: '#fff', borderRadius: 20, maxWidth: 720, width: '100%', maxHeight: '90vh', overflowY: 'auto', boxShadow: '0 24px 80px rgba(0,0,0,0.4)' }}>
        {/* Invoice content */}
        <div style={{ padding: '40px 48px' }}>
          {/* Header */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 40 }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: 22, letterSpacing: '-0.04em', background: C.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: 4 }}>DAS e-shop</div>
              <p style={{ fontSize: 12, color: C.muted, lineHeight: 1.7 }}>Hlavná 15, 811 01 Bratislava<br/>IČO: 12345678 | DIČ: 2023456789<br/>das@eshop.sk | +421 900 000 000</p>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>Faktúra</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: C.text }}>{order.invoiceNo}</div>
              <div style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>{order.date}</div>
            </div>
          </div>

          {/* Billing */}
          <div style={{ display: 'flex', gap: 40, marginBottom: 36 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>Odberateľ</div>
              <p style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 2 }}>{user.firstName} {user.lastName}</p>
              <p style={{ fontSize: 13, color: C.sub, lineHeight: 1.7 }}>{user.company}<br/>{user.street}<br/>{user.postal} {user.city}</p>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>Platba</div>
              <p style={{ fontSize: 13, color: C.sub, lineHeight: 1.7 }}>Číslo objednávky: <strong style={{color:C.text}}>{order.id}</strong><br/>Dátum splatnosti: <strong style={{color:C.text}}>{order.date}</strong><br/>Spôsob: Bankový prevod</p>
            </div>
          </div>

          {/* Items table */}
          <table style={{ width: '100%', borderCollapse: 'collapse', marginBottom: 24 }}>
            <thead>
              <tr style={{ borderBottom: `2px solid ${C.border}` }}>
                {['Položka', 'Množstvo', 'Jednotková cena', 'Spolu'].map((h, i) => (
                  <th key={h} style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.06em', padding: '8px 0', textAlign: i === 0 ? 'left' : 'right' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {order.items.map((it, i) => (
                <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                  <td style={{ padding: '12px 0' }}>
                    <div style={{ fontSize: 14, fontWeight: 500, color: C.text }}>{it.name}</div>
                    {it.variant && <div style={{ fontSize: 12, color: C.cyan }}>{it.variant}</div>}
                  </td>
                  <td style={{ fontSize: 14, color: C.sub, textAlign: 'right', padding: '12px 0' }}>{it.qty}×</td>
                  <td style={{ fontSize: 14, color: C.sub, textAlign: 'right', padding: '12px 0' }}>{it.price.toFixed(2)} €</td>
                  <td style={{ fontSize: 14, fontWeight: 600, color: C.text, textAlign: 'right', padding: '12px 0' }}>{(it.price * it.qty).toFixed(2)} €</td>
                </tr>
              ))}
            </tbody>
          </table>

          {/* Totals */}
          <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
            <div style={{ minWidth: 260 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                <span style={{ fontSize: 13, color: C.sub }}>Medziúčet</span>
                <span style={{ fontSize: 13, color: C.text }}>{subtotal.toFixed(2)} €</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12, paddingBottom: 12, borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 13, color: C.sub }}>Doprava ({order.shipping})</span>
                <span style={{ fontSize: 13, color: order.shippingCost === 0 ? '#10b981' : C.text }}>{order.shippingCost === 0 ? 'Zadarmo' : `${order.shippingCost.toFixed(2)} €`}</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: C.text }}>Celkom</span>
                <span style={{ fontSize: 22, fontWeight: 800, background: C.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{order.total.toFixed(2)} €</span>
              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{ marginTop: 40, paddingTop: 20, borderTop: `1px solid ${C.border}`, fontSize: 11, color: C.muted, textAlign: 'center', lineHeight: 1.7 }}>
            Faktúra bola vystavená elektronicky a je platná bez podpisu. Ďakujeme za váš nákup.
          </div>
        </div>

        {/* Actions */}
        <div style={{ padding: '16px 48px 32px', display: 'flex', gap: 12, justifyContent: 'flex-end', borderTop: `1px solid ${C.border}` }}>
          <GBtn outline onClick={onClose}>Zavrieť</GBtn>
          <GBtn onClick={() => window.print()} icon={
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          }>Exportovať PDF</GBtn>
        </div>
      </div>
    </div>
  );
}

// ── ORDER ROW ────────────────────────────────────────────────
function OrderRow({ order, user, onViewInvoice }) {
  const [open, setOpen] = useState(false);
  const sc = STATUS_CONFIG[order.status] || STATUS_CONFIG['Spracováva sa'];
  const subtotal = order.items.reduce((s, it) => s + it.price * it.qty, 0);
  return (
    <div style={{ border: `1px solid ${open ? C.cyan : C.border}`, borderRadius: 16, marginBottom: 12, overflow: 'hidden', transition: 'border-color 0.2s, box-shadow 0.2s', boxShadow: open ? '0 0 0 3px rgba(8,145,178,0.08)' : '0 1px 4px rgba(0,0,0,0.04)' }}>
      {/* Row header */}
      <div onClick={() => setOpen(!open)} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '16px 20px', cursor: 'pointer', background: open ? C.cyanLite : C.card, transition: 'background 0.2s' }}>
        {/* Expand chevron */}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ transform: open ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform 0.2s', flexShrink: 0 }}>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        {/* Order ID */}
        <div style={{ flex: '0 0 160px' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{order.id}</div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{order.date}</div>
        </div>
        {/* Items summary */}
        <div style={{ flex: 1, fontSize: 13, color: C.sub }}>
          {order.items.slice(0, 2).map(it => it.name).join(', ')}
          {order.items.length > 2 ? ` +${order.items.length - 2} ďalšie` : ''}
        </div>
        {/* Status badge */}
        <span style={{ fontSize: 12, fontWeight: 600, color: sc.color, background: sc.bg, borderRadius: 20, padding: '4px 12px', flexShrink: 0 }}>
          <span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: '50%', background: sc.dot, marginRight: 5, verticalAlign: 'middle' }} />
          {order.status}
        </span>
        {/* Total */}
        <div style={{ fontSize: 15, fontWeight: 700, color: C.text, flexShrink: 0, minWidth: 80, textAlign: 'right' }}>{order.total.toFixed(2)} €</div>
      </div>

      {/* Expanded detail */}
      {open && (
        <div className="fade-up" style={{ borderTop: `1px solid ${C.border}`, background: C.card }}>
          <div style={{ padding: '16px 20px 16px 52px' }}>
            {/* Items */}
            <div style={{ marginBottom: 16 }}>
              {order.items.map((it, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: i < order.items.length - 1 ? `1px solid ${C.border}` : 'none' }}>
                  <div style={{ width: 38, height: 38, borderRadius: 8, background: 'linear-gradient(135deg, #cffafe, #d1fae5)', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 7, color: C.muted, fontFamily: 'monospace', textAlign: 'center', lineHeight: 1.3 }}>product</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{it.name}</div>
                    {it.variant && <div style={{ fontSize: 11, color: C.cyan }}>{it.variant}</div>}
                  </div>
                  <div style={{ fontSize: 12, color: C.muted }}>{it.qty}×</div>
                  <div style={{ fontSize: 13, fontWeight: 500, color: C.text, minWidth: 64, textAlign: 'right' }}>{(it.price * it.qty).toFixed(2)} €</div>
                </div>
              ))}
            </div>
            {/* Footer row */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 12, color: C.muted }}>Doprava: <span style={{ color: C.sub, fontWeight: 500 }}>{order.shipping}</span></div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                {order.invoiceNo && (
                  <GBtn sm outline onClick={() => onViewInvoice(order)} icon={
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                  }>Faktúra</GBtn>
                )}
                <GBtn sm onClick={() => {}} icon={
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 4h22l-2 9H3L1 4z"/><circle cx="9" cy="20" r="1"/><circle cx="20" cy="20" r="1"/></svg>
                }>Objednať znovu</GBtn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PROFILE SETTINGS ────────────────────────────────────────
function ProfileSettings({ user, setUser }) {
  const [saved, setSaved] = useState(false);

  function save() {
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  }

  return (
    <div className="fade-up">
      {/* Personal info */}
      <SectionCard title="Osobné údaje" subtitle="Základné informácie o vašom účte">
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 16 }}>
          <Field label="Meno" value={user.firstName} onChange={v => setUser({ ...user, firstName: v })} half />
          <Field label="Priezvisko" value={user.lastName} onChange={v => setUser({ ...user, lastName: v })} half />
        </div>
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 16 }}>
          <Field label="E-mail" value={user.email} onChange={v => setUser({ ...user, email: v })} half />
          <Field label="Telefón" value={user.phone} onChange={v => setUser({ ...user, phone: v })} half />
        </div>
        <Field label="Spoločnosť" value={user.company} onChange={v => setUser({ ...user, company: v })} />
      </SectionCard>

      {/* Address */}
      <SectionCard title="Fakturačná adresa" subtitle="Adresa pre vystavovanie faktúr">
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 16 }}>
          <Field label="Ulica a číslo" value={user.street} onChange={v => setUser({ ...user, street: v })} half />
          <div style={{ flex: '1 1 45%', display: 'flex', gap: 10 }}>
            <div style={{ flex: 2 }}><Field label="Mesto" value={user.city} onChange={v => setUser({ ...user, city: v })} /></div>
            <div style={{ flex: 1 }}><Field label="PSČ" value={user.postal} onChange={v => setUser({ ...user, postal: v })} /></div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
          <Field label="IČO" value={user.ico} onChange={v => setUser({ ...user, ico: v })} half />
          <Field label="DIČ / IČ DPH" value={user.dic} onChange={v => setUser({ ...user, dic: v })} half />
        </div>
      </SectionCard>

      {/* Password */}
      <SectionCard title="Heslo" subtitle="Zmeňte si prihlasovacie heslo">
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 16 }}>
          <Field label="Aktuálne heslo" type="password" placeholder="••••••••" half />
          <Field label="Nové heslo" type="password" placeholder="••••••••" half />
        </div>
        <Field label="Potvrďte nové heslo" type="password" placeholder="••••••••" half />
      </SectionCard>

      {/* Save */}
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 12 }}>
        {saved && <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: '#10b981', fontWeight: 500 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Zmeny boli uložené
        </div>}
        <GBtn lg onClick={save} icon={
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13"/><polyline points="7 3 7 8 15 8"/></svg>
        }>Uložiť zmeny</GBtn>
      </div>
    </div>
  );
}

// ── ORDERS SCREEN ────────────────────────────────────────────
function OrdersScreen({ user }) {
  const [invoiceOrder, setInvoiceOrder] = useState(null);
  return (
    <div className="fade-up">
      {invoiceOrder && <InvoicePrint order={invoiceOrder} user={user} onClose={() => setInvoiceOrder(null)} />}

      {/* Stats row */}
      <div style={{ display: 'flex', gap: 16, marginBottom: 24 }}>
        {[
          { label: 'Celkové objednávky', value: ORDERS.length, color: C.cyan },
          { label: 'Doručené', value: ORDERS.filter(o => o.status === 'Doručené').length, color: '#10b981' },
        ].map(stat => (
          <div key={stat.label} style={{ flex: 1, background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: '16px 20px', boxShadow: '0 1px 4px rgba(0,0,0,0.04)' }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>{stat.label}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.text }}>{stat.value}</div>
          </div>
        ))}
      </div>

      {/* Orders list */}
      <div style={{ background: C.card, borderRadius: 20, border: `1px solid ${C.border}`, overflow: 'hidden', boxShadow: '0 1px 8px rgba(0,0,0,0.04)', marginBottom: 20 }}>
        <div style={{ padding: '20px 24px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: C.text }}>Moje objednávky</h3>
            <p style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>Kliknite na objednávku pre zobrazenie detailov</p>
          </div>
          {/* Filter tabs */}
          <div style={{ display: 'flex', gap: 4, background: C.bg, borderRadius: 10, padding: 4 }}>
            {['Všetky', 'Doručené', 'V procese'].map((tab, i) => (
              <button key={tab} style={{ padding: '6px 14px', borderRadius: 8, border: 'none', fontSize: 12, fontWeight: i === 0 ? 600 : 400, color: i === 0 ? C.text : C.muted, background: i === 0 ? C.card : 'transparent', cursor: 'pointer', fontFamily: 'Inter', boxShadow: i === 0 ? '0 1px 4px rgba(0,0,0,0.08)' : 'none' }}>{tab}</button>
            ))}
          </div>
        </div>
        <div style={{ padding: '16px 20px' }}>
          {ORDERS.map(order => (
            <OrderRow key={order.id} order={order} user={user} onViewInvoice={setInvoiceOrder} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ── SIDEBAR ──────────────────────────────────────────────────
function Sidebar({ active, setActive, user }) {
  const links = [
    { id: 'profile', label: 'Profil', icon: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
    { id: 'orders', label: 'Objednávky', icon: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>, badge: ORDERS.length },
  ];
  return (
    <div style={{ width: 240, flexShrink: 0 }}>
      {/* User card */}
      <div style={{ background: C.card, borderRadius: 20, border: `1px solid ${C.border}`, padding: '18px 20px', marginBottom: 12, boxShadow: '0 1px 8px rgba(0,0,0,0.04)' }}>
        <p style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{user.firstName} {user.lastName}</p>
        <p style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{user.email}</p>
        <div style={{ marginTop: 10, padding: '5px 12px', background: C.cyanLite, borderRadius: 10, display: 'inline-block' }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: C.cyan }}>Overený zákazník</span>
        </div>
      </div>
      {/* Nav */}
      <div style={{ background: C.card, borderRadius: 20, border: `1px solid ${C.border}`, overflow: 'hidden', boxShadow: '0 1px 8px rgba(0,0,0,0.04)' }}>
        {links.map((link, i) => {
          const isActive = active === link.id;
          return (
            <button key={link.id} onClick={() => setActive(link.id)} style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '14px 18px',
              background: isActive ? C.cyanLite : 'transparent',
              border: 'none', borderBottom: i < links.length - 1 ? `1px solid ${C.border}` : 'none',
              cursor: 'pointer', fontFamily: 'Inter', textAlign: 'left',
              color: isActive ? C.cyan : C.sub, transition: 'all 0.15s',
            }}>
              <span style={{ opacity: isActive ? 1 : 0.7 }}>{link.icon}</span>
              <span style={{ fontSize: 13, fontWeight: isActive ? 600 : 400, flex: 1 }}>{link.label}</span>
              {link.badge !== undefined && (
                <span style={{ fontSize: 11, fontWeight: 700, color: isActive ? C.cyan : '#fff', background: isActive ? 'rgba(8,145,178,0.15)' : C.muted, borderRadius: 20, padding: '1px 7px' }}>{link.badge}</span>
              )}
              {isActive && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.cyan} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>}
            </button>
          );
        })}
      </div>

      {/* Logout */}
      <button style={{ marginTop: 12, width: '100%', padding: '12px', borderRadius: 14, border: `1px solid ${C.border}`, background: 'transparent', color: '#ef4444', fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: 'Inter', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Odhlásiť sa
      </button>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState('profile');
  const [user, setUser] = useState({
    firstName: 'Marek', lastName: 'Novák',
    email: 'marek.novak@dasklinika.sk',
    phone: '+421 900 123 456',
    company: 'DAS Klinika s.r.o.',
    street: 'Hlavná 15',
    city: 'Bratislava',
    postal: '811 01',
    ico: '12345678',
    dic: '2023456789',
  });

  return (
    <div style={{ minHeight: '100vh', background: C.bg }}>
      <Navbar />
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '32px 32px' }}>
        {/* Breadcrumb */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 24 }}>
          <a href="#" style={{ fontSize: 13, color: C.muted, textDecoration: 'none' }}>Domov</a>
          <svg width="6" height="10" viewBox="0 0 6 10"><path d="M1 1l4 4-4 4" stroke={C.muted} strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>
          <span style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>{activeTab === 'profile' ? 'Môj profil' : 'Moje objednávky'}</span>
        </div>

        <div style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
          <Sidebar active={activeTab} setActive={setActiveTab} user={user} />
          <div style={{ flex: 1, minWidth: 0 }}>
            {activeTab === 'profile' && <ProfileSettings user={user} setUser={setUser} />}
            {activeTab === 'orders' && <OrdersScreen user={user} />}

          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
