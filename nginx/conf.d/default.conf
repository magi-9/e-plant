limit_req_zone $binary_remote_addr zone=apizone:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_tokens off;

    # Security headers to prevent CSRF, Clickjacking, MIME-sniffing
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';" always;

    # Apply reasonable connection limits per IP to avoid naive DDoS
    limit_conn addr 20;

    # Max upload size — aligned with Django ProductImageField 5MB limit
    client_max_body_size 6M;

    # DENY access to sensitive files and directories
    location ~ /\.env {
        return 404;
    }
    location ~ /\.env\.local {
        return 404;
    }
    location ~ /\.env\.production {
        return 404;
    }
    location ~ /sftp-config\.json {
        return 404;
    }
    location ~ /\.git/ {
        return 404;
    }
    location ~ /\.aws/ {
        return 404;
    }
    location ~ /backend/ {
        return 404;
    }
    location ~ /config/ {
        return 404;
    }
    location ~ /\.vscode/ {
        return 404;
    }

    # Static assets (Frontend)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy
    location /api/ {
        # Rate limit APIs independently to prevent abuse
        limit_req zone=apizone burst=15 nodelay;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Panel Proxy — stricter rate limit than API
    location /admin/ {
        limit_req zone=apizone burst=5 nodelay;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static / Media files
    location /static/ {
        alias /usr/src/app/static/;
    }

    location /media/ {
        alias /usr/src/app/media/;
    }
}
