limit_req_zone $binary_remote_addr zone=apizone:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_tokens off;

    # Security headers to prevent CSRF, Clickjacking, MIME-sniffing
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';" always;

    # Apply reasonable connection limits per IP to avoid naive DDoS
    limit_conn addr 20;

    # Max upload size — aligned with Django ProductImageField 5MB limit
    client_max_body_size 6M;

    # DENY access to sensitive files and directories
    location ~ /\.env             { return 404; }
    location ~ /\.env\.local      { return 404; }
    location ~ /\.env\.production { return 404; }
    location ~ /sftp-config\.json { return 404; }
    location ~ /\.git/            { return 404; }
    location ~ /\.aws/            { return 404; }
    location ~ /backend/          { return 404; }
    location ~ /config/           { return 404; }
    location ~ /\.vscode/         { return 404; }

    # API Proxy
    location /api/ {
        # Rate limit APIs independently to prevent abuse
        limit_req zone=apizone burst=15 nodelay;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Panel Proxy (Django admin) — stricter rate limit than API
    location /admin/ {
        limit_req zone=apizone burst=5 nodelay;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static / Media files
    location /static/ {
        alias /usr/src/app/static/;
    }

    location /media/ {
        alias /usr/src/app/media/;
    }

    # Valid SPA routes → index.html with 200
    # /admin/* excluded — those are proxied to Django above
    location ~ ^/(products|about|cart|checkout|profile|orders|login|register|verify-email|forgot-password|reset-password|terms|privacy|complaints|withdrawal)(/.*)?$ {
        root /usr/share/nginx/html;
        try_files /index.html =500;
    }

    # Root and React admin dashboard root
    location = /       { root /usr/share/nginx/html; try_files /index.html =500; }
    location = /admin  { root /usr/share/nginx/html; try_files /index.html =500; }

    # Static assets (JS, CSS, images …) — serve if the file exists
    # Anything not matching a route above and not an existing file → 404
    location / {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # 404 handler: serve the React app so NotFoundPage renders, status stays 404
    error_page 404 =404 @not_found;
    location @not_found {
        root /usr/share/nginx/html;
        try_files /index.html =500;
    }
}
