services:
  db:
    image: postgres:15
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    deploy:
      restart_policy:
        condition: on-failure

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: /app/entrypoint.prod.sh
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "5002:8000" # Formát "HOST:CONTAINER"
    depends_on:
      - db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    ports:
      - "5001:80" # Nginx vnútri beží na 80, vonku ho uvidíš na 5001
    depends_on:
      - backend
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:

networks:
  dokploy-network:
    external: true