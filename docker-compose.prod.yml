services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eplant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-eplant_prod}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.prod.sh
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      - db
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eplant-prod-backend.rule=Host(`${FRONTEND_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`))"
      - "traefik.http.routers.eplant-prod-backend.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-backend.priority=10"
      - "traefik.http.services.eplant-prod-backend.loadbalancer.server.port=8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    expose:
      - "80"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eplant-prod-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.eplant-prod-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-frontend.priority=1"
      - "traefik.http.services.eplant-prod-frontend.loadbalancer.server.port=80"
    deploy:
      restart_policy:
        condition: on-failure

  dokploy-webhook-relay:
    image: alpine/socat:1.8.0.3
    command: "TCP-LISTEN:8080,fork,reuseaddr TCP:${DOKPLOY_INTERNAL_HOST:-192.168.0.15}:${DOKPLOY_INTERNAL_PORT:-3000}"
    expose:
      - "8080"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.rule=Host(`${FRONTEND_DOMAIN}`) && Path(`/api/deploy/compose/${DOKPLOY_WEBHOOK_TOKEN:-replace_with_dokploy_token}`)"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.priority=100"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.service=eplant-prod-dokploy-webhook"
      - "traefik.http.services.eplant-prod-dokploy-webhook.loadbalancer.server.port=8080"
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:

networks:
  dokploy-network:
    external: true