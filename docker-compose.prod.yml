services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.prod.sh
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    env_file:
      - path: .env
        required: false
      - path: .env.prod
        required: false
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /root/eplant-data:/data:ro
      - prometheus_multiproc:/tmp/prometheus_multiproc
    networks:
      - default
      - dokploy-network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_HOME_PAGE_READY: ${VITE_HOME_PAGE_READY:-true}
        VITE_LANDING_HOST: ${VITE_LANDING_HOST:-ebringer.sk}
        VITE_SHOP_HOST: ${VITE_SHOP_HOST:-dynamicabutment.ebringer.sk}
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:80', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 20s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

volumes:
  static_volume:
  media_volume:
  prometheus_multiproc:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=1000,gid=1000

networks:
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}