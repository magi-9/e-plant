services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eplant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-eplant_prod}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.prod.sh
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "5002:8000"
    depends_on:
      - db
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend:8000/api}
    ports:
      - "5001:80"
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:

networks:
  dokploy-network:
    external: true