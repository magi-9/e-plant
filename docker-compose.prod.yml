services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.prod.sh
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    env_file:
      - path: .env
        required: false
      - path: .env.prod
        required: false
    volumes:
      - media_volume:/app/media
      - /root/eplant-data:/data:ro
      - prometheus_multiproc:/tmp/prometheus_multiproc
    networks:
      - default
      - dokploy-network
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eplant-prod-backend.rule=(Host(`${DOMAIN_MAIN:-ebringer.sk}`) || Host(`${DOMAIN_SUB:-dynamicabutment.ebringer.sk}`)) && (PathPrefix(`/api`) || PathPrefix(`/media`) || PathPrefix(`/static`) || PathPrefix(`/django-admin`))"
      - "traefik.http.routers.eplant-prod-backend.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-backend.priority=10"
      - "traefik.http.routers.eplant-prod-backend.middlewares=eplant-security-headers@docker"
      - "traefik.http.services.eplant-prod-backend.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.eplant-security-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';"
      - "traefik.http.middlewares.eplant-security-headers.headers.referrerPolicy=no-referrer-when-downgrade"
      - "traefik.http.middlewares.eplant-security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.eplant-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.eplant-security-headers.headers.browserXssFilter=true"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.eplant-prod-backend.rule=(Host(`${DOMAIN_MAIN:-ebringer.sk}`) || Host(`${DOMAIN_SUB:-dynamicabutment.ebringer.sk}`)) && (PathPrefix(`/api`) || PathPrefix(`/media`) || PathPrefix(`/static`) || PathPrefix(`/django-admin`))"
        - "traefik.http.routers.eplant-prod-backend.entrypoints=web,websecure"
        - "traefik.http.routers.eplant-prod-backend.priority=10"
        - "traefik.http.routers.eplant-prod-backend.middlewares=eplant-security-headers@docker"
        - "traefik.http.services.eplant-prod-backend.loadbalancer.server.port=8000"
        - "traefik.http.middlewares.eplant-security-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';"
        - "traefik.http.middlewares.eplant-security-headers.headers.referrerPolicy=no-referrer-when-downgrade"
        - "traefik.http.middlewares.eplant-security-headers.headers.frameDeny=true"
        - "traefik.http.middlewares.eplant-security-headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.eplant-security-headers.headers.browserXssFilter=true"
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_HOME_PAGE_READY: ${VITE_HOME_PAGE_READY:-true}
        VITE_LANDING_HOST: ${VITE_LANDING_HOST:-ebringer.sk}
        VITE_SHOP_HOST: ${VITE_SHOP_HOST:-dynamicabutment.ebringer.sk}
    expose:
      - "80"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eplant-prod-frontend.rule=(Host(`${DOMAIN_MAIN:-ebringer.sk}`) || Host(`${DOMAIN_SUB:-dynamicabutment.ebringer.sk}`)) && PathPrefix(`/`)"
      - "traefik.http.routers.eplant-prod-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-frontend.priority=1"
      - "traefik.http.routers.eplant-prod-frontend.middlewares=eplant-security-headers@docker"
      - "traefik.http.services.eplant-prod-frontend.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:80', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.eplant-prod-frontend.rule=(Host(`${DOMAIN_MAIN:-ebringer.sk}`) || Host(`${DOMAIN_SUB:-dynamicabutment.ebringer.sk}`)) && PathPrefix(`/`)"
        - "traefik.http.routers.eplant-prod-frontend.entrypoints=web,websecure"
        - "traefik.http.routers.eplant-prod-frontend.priority=1"
        - "traefik.http.routers.eplant-prod-frontend.middlewares=eplant-security-headers@docker"
        - "traefik.http.services.eplant-prod-frontend.loadbalancer.server.port=80"
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 20s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

volumes:
  media_volume:
  prometheus_multiproc:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=1000,gid=1000

networks:
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
