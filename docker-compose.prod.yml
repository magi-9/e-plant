services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eplant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-eplant_prod}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.prod.sh
    user: "0:0"
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /home/tom/eplant-data:/data:ro
    expose:
      - "8000"
    depends_on:
      - db
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Manual path routing for tunnel traffic; avoid Host-based matching.
      - "traefik.http.routers.eplant-prod-backend.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/media`)"
      - "traefik.http.routers.eplant-prod-backend.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-backend.priority=10"
      - "traefik.http.routers.eplant-prod-backend.middlewares=eplant-security-headers@docker"
      - "traefik.http.services.eplant-prod-backend.loadbalancer.server.port=8000"
      # Security headers middleware (defined here, reused by frontend router)
      - "traefik.http.middlewares.eplant-security-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';"
      - "traefik.http.middlewares.eplant-security-headers.headers.referrerPolicy=no-referrer-when-downgrade"
      - "traefik.http.middlewares.eplant-security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.eplant-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.eplant-security-headers.headers.browserXssFilter=true"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.eplant-prod-backend.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/media`)"
        - "traefik.http.routers.eplant-prod-backend.entrypoints=web,websecure"
        - "traefik.http.routers.eplant-prod-backend.priority=10"
        - "traefik.http.routers.eplant-prod-backend.middlewares=eplant-security-headers@docker"
        - "traefik.http.services.eplant-prod-backend.loadbalancer.server.port=8000"
        - "traefik.http.middlewares.eplant-security-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none';"
        - "traefik.http.middlewares.eplant-security-headers.headers.referrerPolicy=no-referrer-when-downgrade"
        - "traefik.http.middlewares.eplant-security-headers.headers.frameDeny=true"
        - "traefik.http.middlewares.eplant-security-headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.eplant-security-headers.headers.browserXssFilter=true"
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    expose:
      - "80"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Frontend catch-all after higher-priority routers.
      - "traefik.http.routers.eplant-prod-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.eplant-prod-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-frontend.priority=1"
      - "traefik.http.routers.eplant-prod-frontend.middlewares=eplant-security-headers@docker"
      - "traefik.http.services.eplant-prod-frontend.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:80', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.eplant-prod-frontend.rule=PathPrefix(`/`)"
        - "traefik.http.routers.eplant-prod-frontend.entrypoints=web,websecure"
        - "traefik.http.routers.eplant-prod-frontend.priority=1"
        - "traefik.http.routers.eplant-prod-frontend.middlewares=eplant-security-headers@docker"
        - "traefik.http.services.eplant-prod-frontend.loadbalancer.server.port=80"
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 20s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  alloy:
    image: grafana/alloy:v1.6.1
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL:-}
      - GRAFANA_LOKI_USER=${GRAFANA_LOKI_USER:-}
      - GRAFANA_LOKI_API_KEY=${GRAFANA_LOKI_API_KEY:-}
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure

  dokploy-webhook-relay:
    image: alpine/socat:1.8.0.3
    command: "TCP-LISTEN:8080,fork,reuseaddr TCP:${DOKPLOY_INTERNAL_HOST:-192.168.0.15}:${DOKPLOY_INTERNAL_PORT:-3000}"
    expose:
      - "8080"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.rule=Path(`/api/deploy/compose/${DOKPLOY_WEBHOOK_TOKEN:-replace_with_dokploy_token}`)"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.entrypoints=web,websecure"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.priority=100"
      - "traefik.http.routers.eplant-prod-dokploy-webhook.service=eplant-prod-dokploy-webhook"
      - "traefik.http.services.eplant-prod-dokploy-webhook.loadbalancer.server.port=8080"
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.eplant-prod-dokploy-webhook.rule=Path(`/api/deploy/compose/${DOKPLOY_WEBHOOK_TOKEN:-replace_with_dokploy_token}`)"
        - "traefik.http.routers.eplant-prod-dokploy-webhook.entrypoints=web,websecure"
        - "traefik.http.routers.eplant-prod-dokploy-webhook.priority=100"
        - "traefik.http.routers.eplant-prod-dokploy-webhook.service=eplant-prod-dokploy-webhook"
        - "traefik.http.services.eplant-prod-dokploy-webhook.loadbalancer.server.port=8080"
      restart_policy:
        condition: on-failure

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:

networks:
  dokploy-network:
    external: true