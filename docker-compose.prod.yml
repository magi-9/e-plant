services:
  db:
    image: postgres:15
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.prod.sh
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "5002:8000"
    depends_on:
      - db
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com/api}
    ports:
      - "5001:80"
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:

networks:
  dokploy-network:
    external: true